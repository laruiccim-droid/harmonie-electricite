<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Harmonie Élec">
<title>Harmonie Électricité</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap');

  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #222;
    --border: #2a2a2a;
    --accent: #f5a623;
    --accent2: #e8420a;
    --green: #22c55e;
    --red: #ef4444;
    --text: #f0f0f0;
    --muted: #888;
    --radius: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    min-height: -webkit-fill-available;
    max-width: 480px;
    margin: 0 auto;
    overflow-x: hidden;
  }

  /* TOP BAR */
  .topbar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(15,15,15,0.95);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    padding: 14px 18px 10px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .topbar-logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 17px;
    color: var(--accent);
    letter-spacing: -0.3px;
  }
  .topbar-logo span { color: var(--text); }
  .sync-indicator {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }
  .sync-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--red);
    transition: background 0.4s;
  }
  .sync-dot.green { background: var(--green); }
  .sync-dot.syncing { background: var(--accent); animation: pulse 0.8s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* NAV */
  nav {
    position: fixed;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 100%; max-width: 480px;
    background: rgba(20,20,20,0.97);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-top: 1px solid var(--border);
    display: flex;
    padding: 8px 0 max(8px, env(safe-area-inset-bottom));
    z-index: 100;
  }
  .nav-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    cursor: pointer;
    padding: 4px 0;
    transition: color 0.2s;
  }
  .nav-btn.active { color: var(--accent); }
  .nav-btn svg { width: 22px; height: 22px; }
  .nav-badge {
    position: absolute;
    top: -4px; right: -4px;
    width: 16px; height: 16px;
    background: var(--accent2);
    border-radius: 50%;
    font-size: 9px;
    display: flex; align-items: center; justify-content: center;
    color: white; font-weight: 700;
  }
  .nav-icon-wrap { position: relative; }

  /* CONTENT */
  .content {
    padding: 16px 16px 100px;
  }
  .tab { display: none; }
  .tab.active { display: block; }

  /* CARDS */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
  }
  .card-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 13px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 12px;
  }

  /* BUTTONS */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 11px 18px;
    border-radius: 10px;
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn:active { transform: scale(0.96); }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-danger { background: var(--red); color: white; }
  .btn-green { background: var(--green); color: #000; }
  .btn-full { width: 100%; justify-content: center; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* === DICTAPHONE === */
  #mic-section {
    text-align: center;
    padding: 8px 0 16px;
  }
  .mic-btn {
    width: 88px; height: 88px;
    border-radius: 50%;
    border: 3px solid var(--accent);
    background: var(--surface2);
    color: var(--accent);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    margin: 0 auto;
    box-shadow: 0 0 0 0 rgba(245,166,35,0.4);
  }
  .mic-btn.recording {
    background: var(--accent2);
    border-color: var(--accent2);
    color: white;
    animation: micpulse 1.2s infinite;
  }
  @keyframes micpulse {
    0% { box-shadow: 0 0 0 0 rgba(232,66,10,0.5); }
    70% { box-shadow: 0 0 0 18px rgba(232,66,10,0); }
    100% { box-shadow: 0 0 0 0 rgba(232,66,10,0); }
  }
  .mic-btn svg { width: 36px; height: 36px; }
  .mic-status {
    margin-top: 10px;
    font-size: 13px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }
  .transcript-area {
    width: 100%;
    min-height: 80px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    padding: 12px;
    resize: none;
    margin: 12px 0 10px;
    outline: none;
    line-height: 1.5;
  }
  .transcript-area:focus { border-color: var(--accent); }
  .tag-row {
    display: flex;
    gap: 7px;
    flex-wrap: wrap;
    margin-bottom: 12px;
  }
  .tag-btn {
    padding: 6px 13px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'DM Sans', sans-serif;
  }
  .tag-btn.selected {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(245,166,35,0.1);
  }

  /* NOTES LIST */
  .note-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 8px;
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }
  .note-tag {
    font-size: 10px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 6px;
    flex-shrink: 0;
    margin-top: 1px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.5px;
  }
  .tag-devis { background: rgba(245,166,35,0.2); color: var(--accent); }
  .tag-client { background: rgba(34,197,94,0.2); color: var(--green); }
  .tag-chantier { background: rgba(99,102,241,0.2); color: #818cf8; }
  .tag-materiel { background: rgba(232,66,10,0.2); color: #f87171; }
  .tag-idee { background: rgba(139,92,246,0.2); color: #c084fc; }
  .note-body { flex: 1; }
  .note-text { font-size: 14px; line-height: 1.45; }
  .note-time { font-size: 11px; color: var(--muted); margin-top: 4px; font-family: 'DM Mono', monospace; }
  .note-actions { display: flex; gap: 6px; margin-top: 8px; }
  .note-del { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 18px; padding: 0 4px; }
  .note-del:hover { color: var(--red); }
  .empty-state { text-align: center; color: var(--muted); padding: 32px 16px; font-size: 14px; }

  /* === CHECKLIST === */
  .checklist-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .progress-bar-wrap { background: var(--surface2); border-radius: 6px; height: 6px; flex: 1; margin: 0 12px; }
  .progress-bar-fill { background: var(--accent); height: 6px; border-radius: 6px; transition: width 0.4s; }
  .progress-label { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); }

  .check-item {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 10px;
    transition: all 0.2s;
  }
  .check-item.locked { opacity: 0.4; }
  .check-item.done { border-color: var(--green); opacity: 0.7; }
  .check-item.skipped { border-color: var(--muted); opacity: 0.5; }
  .check-item-top { display: flex; align-items: center; gap: 10px; }
  .check-number {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--surface);
    border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    flex-shrink: 0;
    color: var(--muted);
  }
  .check-item.active .check-number { border-color: var(--accent); color: var(--accent); }
  .check-item.done .check-number { background: var(--green); border-color: var(--green); color: #000; }
  .check-label { font-size: 14px; font-weight: 600; flex: 1; }
  .check-detail { font-size: 12px; color: var(--muted); margin: 6px 0 10px 38px; }
  .check-btns { display: flex; gap: 7px; margin-top: 10px; margin-left: 38px; }

  /* === CLIENTS === */
  .urgency-badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 6px;
    font-family: 'DM Mono', monospace;
  }
  .urgency-high { background: rgba(239,68,68,0.2); color: #f87171; }
  .urgency-medium { background: rgba(245,166,35,0.2); color: var(--accent); }
  .urgency-low { background: rgba(34,197,94,0.2); color: var(--green); }

  .client-item {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 10px;
  }
  .client-item.done { opacity: 0.5; }
  .client-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
  .client-name { font-weight: 700; font-size: 15px; }
  .client-type { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
  .client-note { font-size: 13px; line-height: 1.4; margin-bottom: 10px; background: var(--surface); padding: 8px 10px; border-radius: 8px; }
  .client-btns { display: flex; gap: 7px; flex-wrap: wrap; }

  /* AI RESPONSE */
  .ai-response {
    background: var(--surface);
    border: 1px solid rgba(245,166,35,0.3);
    border-radius: 10px;
    padding: 14px;
    margin-top: 10px;
    font-size: 14px;
    line-height: 1.6;
    white-space: pre-wrap;
    display: none;
  }
  .ai-response.visible { display: block; }
  .ai-loading { color: var(--accent); font-family: 'DM Mono', monospace; font-size: 12px; }

  /* AGENDA */
  .agenda-event {
    display: flex;
    gap: 12px;
    padding: 12px 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 8px;
    align-items: flex-start;
  }
  .event-time {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    min-width: 50px;
    margin-top: 1px;
  }
  .event-body { flex: 1; }
  .event-title { font-size: 14px; font-weight: 600; }
  .event-location { font-size: 12px; color: var(--muted); margin-top: 2px; }

  /* IA PANEL */
  .ia-shortcuts {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 16px;
  }
  .shortcut-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 13px 12px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    text-align: left;
    transition: all 0.15s;
  }
  .shortcut-btn:active { transform: scale(0.97); background: var(--surface); }
  .shortcut-icon { font-size: 20px; display: block; margin-bottom: 6px; }

  .ia-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 12px;
    resize: none;
    outline: none;
    min-height: 80px;
    line-height: 1.5;
  }
  .ia-input:focus { border-color: var(--accent); }

  /* MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    z-index: 200;
    display: none;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px 20px 0 0;
    padding: 20px 18px max(20px, env(safe-area-inset-bottom));
    width: 100%; max-width: 480px;
    max-height: 85vh;
    overflow-y: auto;
  }
  .modal-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 18px;
    margin-bottom: 16px;
  }
  .modal-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 11px 13px;
    outline: none;
    margin-bottom: 10px;
  }
  .modal-input:focus { border-color: var(--accent); }
  select.modal-input option { background: var(--surface2); }

  /* SECTION HEADER */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .section-title {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 20px;
  }

  /* DIVIDER */
  .divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

  /* COPY BTN */
  .copy-btn {
    margin-top: 8px;
    font-size: 12px;
    padding: 6px 12px;
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--green);
    color: #000;
    font-weight: 700;
    font-size: 13px;
    padding: 10px 20px;
    border-radius: 24px;
    z-index: 300;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }


  /* === COFFRE CODES === */
  #tab-coffre { padding: 0; }
  .cc-lock { display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; gap:6px; padding:32px 24px; min-height:60vh; }
  .cc-logo { width:72px; height:72px; border-radius:20px; background:var(--accent); color:#000; display:flex; align-items:center; justify-content:center; font-size:34px; margin-bottom:10px; box-shadow:0 6px 24px rgba(245,166,35,0.3); }
  .cc-lock h2 { font-family:'Syne',sans-serif; font-size:20px; font-weight:800; margin:4px 0 0; }
  .cc-lock p { color:var(--muted); margin:4px 0 16px; font-size:14px; max-width:280px; }
  .cc-dots { display:flex; gap:14px; margin:6px 0 16px; }
  .cc-dots .cd { width:15px; height:15px; border-radius:50%; border:2px solid var(--accent); background:transparent; transition:background 0.15s; }
  .cc-dots .cd.f { background:var(--accent); }
  .cc-dots.err .cd { border-color:var(--red); background:var(--red); }
  .cc-shake { animation:ccshake .4s; }
  @keyframes ccshake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-8px)} 40%,80%{transform:translateX(8px)} }
  .cc-pad { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; width:100%; max-width:280px; }
  .cc-key { height:62px; border-radius:50%; border:1px solid var(--border); background:var(--surface); color:var(--text); font-size:24px; font-weight:500; cursor:pointer; }
  .cc-key:active { background:var(--surface2); }
  .cc-key.blank { border:none; background:none; }
  .cc-key.fn { font-size:14px; font-weight:700; color:var(--accent); }
  .cc-lockmsg { color:var(--red); min-height:18px; font-size:13px; margin-top:4px; font-family:'DM Mono',monospace; }
  .cc-topbar { display:flex; align-items:center; gap:10px; padding:12px 16px 8px; position:sticky; top:56px; background:rgba(15,15,15,0.95); backdrop-filter:blur(12px); z-index:50; border-bottom:1px solid var(--border); }
  .cc-topbar-title { font-family:'Syne',sans-serif; font-weight:800; font-size:17px; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .cc-back, .cc-gear { background:var(--surface2); border:1px solid var(--border); border-radius:10px; color:var(--text); width:34px; height:34px; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:16px; flex-shrink:0; }
  .cc-search { position:relative; margin:10px 16px 4px; }
  .cc-search input { width:100%; padding:11px 12px 11px 38px; border-radius:10px; border:1px solid var(--border); background:var(--surface); color:var(--text); font-size:14px; font-family:'DM Sans',sans-serif; outline:none; }
  .cc-search input:focus { border-color:var(--accent); }
  .cc-search .si { position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--muted); }
  .cc-label { font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin:14px 16px 6px; }
  .cc-list { margin:0 16px; }
  .cc-row { display:flex; align-items:center; gap:12px; padding:13px 14px; width:100%; text-align:left; background:var(--surface2); border:1px solid var(--border); border-radius:10px; margin-bottom:6px; cursor:pointer; color:var(--text); }
  .cc-row:active { background:var(--surface); }
  .cc-ic { width:36px; height:36px; border-radius:10px; background:rgba(245,166,35,0.15); color:var(--accent); display:flex; align-items:center; justify-content:center; font-size:17px; flex-shrink:0; }
  .cc-tx { flex:1; min-width:0; }
  .cc-nm { font-weight:600; font-size:14px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .cc-sub { font-size:12px; color:var(--muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; margin-top:1px; }
  .cc-chev { color:var(--muted); font-size:18px; flex-shrink:0; }
  .cc-add { display:flex; align-items:center; gap:10px; width:calc(100% - 32px); margin:6px 16px; padding:12px 14px; border-radius:10px; border:1.5px dashed var(--border); background:transparent; color:var(--accent); font-weight:600; font-size:14px; cursor:pointer; font-family:'DM Sans',sans-serif; }
  .cc-add:active { background:var(--surface2); }
  .cc-field { padding:12px 14px; border-bottom:1px solid var(--border); }
  .cc-field:last-child { border-bottom:none; }
  .cc-field-lbl { font-size:11px; color:var(--muted); font-weight:700; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:4px; }
  .cc-field-val { display:flex; align-items:center; gap:8px; }
  .cc-field-v { flex:1; font-size:16px; word-break:break-word; font-variant-numeric:tabular-nums; }
  .cc-field-v.mask { letter-spacing:3px; color:var(--muted); }
  .cc-field-v.schema-lnk { color:var(--accent); font-weight:600; cursor:pointer; text-decoration:underline; }
  .cc-mini { width:32px; height:32px; border-radius:8px; border:1px solid var(--border); background:var(--surface2); color:var(--muted); display:flex; align-items:center; justify-content:center; font-size:14px; cursor:pointer; flex-shrink:0; }
  .cc-mini:active { background:var(--border); }
  .cc-notes { white-space:pre-wrap; word-break:break-word; font-size:14px; line-height:1.5; }
  .cc-crumb { display:flex; flex-wrap:wrap; gap:4px; align-items:center; font-size:12px; color:var(--muted); padding:6px 16px 2px; }
  .cc-crumb b { color:var(--accent); font-weight:600; cursor:pointer; }
  .cc-modal { position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:500; display:flex; align-items:flex-end; justify-content:center; }
  .cc-sheet { background:var(--surface); border-radius:20px 20px 0 0; padding:20px 18px max(20px,env(safe-area-inset-bottom)); width:100%; max-width:480px; max-height:88vh; overflow-y:auto; }
  .cc-sheet h3 { font-family:'Syne',sans-serif; font-weight:800; font-size:18px; margin-bottom:14px; }
  .cc-sheet label { display:block; font-size:12px; color:var(--muted); font-weight:700; margin:10px 0 4px; text-transform:uppercase; letter-spacing:0.5px; }

<script>
// ============================================================
//  CONFIG — SUPABASE
// ============================================================
const SUPA_URL = 'https://bqzebkobyfktemnwfwbt.supabase.co';
const SUPA_KEY = 'sb_publishable_vh62KxFcG1NuLcnya6WpMg_oFRtY-2v';
const CLAUDE_KEY_URL = 'https://api.anthropic.com/v1/messages';

// ============================================================
//  LOCAL STATE
// ============================================================
let NOTES = [];
let CHECKLIST = [];
let CLIENTS = [];

let recognition = null;
let isRecording = false;
let selectedTag = 'devis';
let syncTimer = null;
let syncPending = false;

// ============================================================
//  SUPABASE HELPERS — stockage JSONB simple
// ============================================================
const SB_HEADERS = {
  'apikey': SUPA_KEY,
  'Authorization': 'Bearer ' + SUPA_KEY,
  'Content-Type': 'application/json'
};

// Fetch all rows → returns array of objects stored in col "payload"
async function sbGet(table) {
  try {
    const r = await fetch(`${SUPA_URL}/rest/v1/${table}?select=id,payload`, {
      headers: SB_HEADERS
    });
    if (!r.ok) return null;
    const rows = await r.json();
    if (!Array.isArray(rows)) return null;
    return rows.map(r => ({ id: r.id, ...r.payload }));
  } catch { return null; }
}

// Upsert one item — store the whole object as payload, keyed by item.id
async function sbUpsert(table, item) {
  try {
    const r = await fetch(`${SUPA_URL}/rest/v1/${table}`, {
      method: 'POST',
      headers: { ...SB_HEADERS, 'Prefer': 'resolution=merge-duplicates,return=minimal' },
      body: JSON.stringify({ id: item.id, payload: item })
    });
    return r.ok || r.status === 201;
  } catch { return false; }
}

// Delete one row by id
async function sbDelete(table, id) {
  try {
    const r = await fetch(`${SUPA_URL}/rest/v1/${table}?id=eq.${encodeURIComponent(id)}`, {
      method: 'DELETE',
      headers: SB_HEADERS
    });
    return r.ok;
  } catch { return false; }
}

// Push entire local array: upsert all + delete rows not in local
async function sbReplaceAll(table, items) {
  try {
    if (items.length) {
      const r = await fetch(`${SUPA_URL}/rest/v1/${table}`, {
        method: 'POST',
        headers: { ...SB_HEADERS, 'Prefer': 'resolution=merge-duplicates,return=minimal' },
        body: JSON.stringify(items.map(item => ({ id: item.id, payload: item })))
      });
      if (!r.ok && r.status !== 201) return false;
    }
    // Remove remote rows whose id is no longer in local
    const localIds = items.map(i => i.id);
    const remote = await sbGet(table);
    if (remote) {
      const toDelete = remote.filter(r => !localIds.includes(r.id));
      for (const row of toDelete) await sbDelete(table, row.id);
    }
    return true;
  } catch { return false; }
}

// ============================================================
//  SYNC  — LOCAL FIRST, THEN PUSH / MERGE
// ============================================================
function setSyncState(state) {
  const dot = document.getElementById('syncDot');
  const lbl = document.getElementById('syncLabel');
  dot.className = 'sync-dot' + (state === 'green' ? ' green' : state === 'syncing' ? ' syncing' : '');
  lbl.textContent = state === 'green' ? 'Sync ✓' : state === 'syncing' ? 'Sync…' : 'Local';
}

function saveLocal() {
  localStorage.setItem('he_notes', JSON.stringify(NOTES));
  localStorage.setItem('he_checklist', JSON.stringify(CHECKLIST));
  localStorage.setItem('he_clients', JSON.stringify(CLIENTS));
}

function loadLocal() {
  try { NOTES = JSON.parse(localStorage.getItem('he_notes')) || []; } catch { NOTES = []; }
  try { CHECKLIST = JSON.parse(localStorage.getItem('he_checklist')) || []; } catch { CHECKLIST = []; }
  try { CLIENTS = JSON.parse(localStorage.getItem('he_clients')) || []; } catch { CLIENTS = []; }
}

// On startup: load local immediately, then sync from Supabase
async function initSync() {
  loadLocal();
  renderNotes(); renderChecklist(); renderClients(); updateClientBadge();

  setSyncState('syncing');

  const [remoteNotes, remoteCheck, remoteClients] = await Promise.all([
    sbGet('notes'), sbGet('checklist'), sbGet('clients')
  ]);

  const anyOk = remoteNotes !== null || remoteCheck !== null || remoteClients !== null;
  if (!anyOk) { setSyncState('red'); return; }

  if (remoteNotes)   NOTES     = mergeArrays(NOTES,     remoteNotes);
  if (remoteCheck)   CHECKLIST = mergeArrays(CHECKLIST, remoteCheck);
  if (remoteClients) CLIENTS   = mergeArrays(CLIENTS,   remoteClients);

  saveLocal();
  renderNotes(); renderChecklist(); renderClients(); updateClientBadge();
  setSyncState('green');
}

// Merge two arrays by id — remote wins for conflicts
function mergeArrays(local, remote) {
  const map = {};
  for (const item of local)  map[item.id] = item;
  for (const item of remote) map[item.id] = item;
  return Object.values(map).sort((a,b) => (b.createdAt||0) - (a.createdAt||0));
}

// Debounced push to Supabase after any change
function schedulePush() {
  saveLocal();
  clearTimeout(syncTimer);
  syncTimer = setTimeout(pushAll, 1500);
  setSyncState('syncing');
}

async function pushAll() {
  const results = await Promise.all([
    sbReplaceAll('notes',     NOTES),
    sbReplaceAll('checklist', CHECKLIST),
    sbReplaceAll('clients',   CLIENTS)
  ]);
  setSyncState(results.every(Boolean) ? 'green' : 'red');
}

// ============================================================
//  TABS
// ============================================================
function switchTab(t) {
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + t).classList.add('active');
  document.getElementById('nav-' + t).classList.add('active');
  if (t === 'agenda') loadAgenda();
}

// ============================================================
//  DICTAPHONE
// ============================================================
function selectTag(btn) {
  document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedTag = btn.dataset.tag;
}

function toggleMic() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    showToast('Micro non disponible dans ce navigateur');
    return;
  }
  if (isRecording) stopMic();
  else startMic();
}

function startMic() {
  const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SpeechRec();
  recognition.lang = 'fr-FR';
  recognition.continuous = true;
  recognition.interimResults = true;
  let final = document.getElementById('transcriptArea').value;

  recognition.onresult = e => {
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) final += e.results[i][0].transcript + ' ';
      else interim = e.results[i][0].transcript;
    }
    document.getElementById('transcriptArea').value = final + interim;
  };
  recognition.onerror = () => stopMic();
  recognition.onend = () => { if (isRecording) recognition.start(); };

  recognition.start();
  isRecording = true;
  document.getElementById('micBtn').classList.add('recording');
  document.getElementById('micStatus').textContent = '● Enregistrement…';
}

function stopMic() {
  if (recognition) { recognition.stop(); recognition = null; }
  isRecording = false;
  document.getElementById('micBtn').classList.remove('recording');
  document.getElementById('micStatus').textContent = 'Appuyer pour dicter';
}

function saveNote() {
  const text = document.getElementById('transcriptArea').value.trim();
  if (!text) { showToast('La note est vide !'); return; }
  if (isRecording) stopMic();

  const note = {
    id: Date.now() + '_' + Math.random().toString(36).slice(2,6),
    tag: selectedTag,
    text,
    time: new Date().toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'}),
    date: new Date().toLocaleDateString('fr-FR'),
    createdAt: Date.now()
  };

  NOTES.unshift(note);
  document.getElementById('transcriptArea').value = '';
  renderNotes();
  schedulePush();
  showToast('Note enregistrée ✓');
}

function deleteNote(id) {
  NOTES = NOTES.filter(n => n.id !== id);
  renderNotes();
  schedulePush();
}

function renderNotes() {
  const today = new Date().toLocaleDateString('fr-FR');
  const el = document.getElementById('notesList');

  if (!NOTES.length) {
    el.innerHTML = '<div class="empty-state">Aucune note<br>Appuie sur le micro pour commencer</div>';
    return;
  }

  // Group notes by date
  const groups = {};
  NOTES.forEach(n => {
    const d = n.date || today;
    if (!groups[d]) groups[d] = [];
    groups[d].push(n);
  });

  // Sort dates descending (today first)
  const sortedDates = Object.keys(groups).sort((a, b) => {
    const parse = d => { const p=d.split('/'); return new Date(p[2],p[1]-1,p[0]); };
    return parse(b) - parse(a);
  });

  let html = '';
  sortedDates.forEach(date => {
    const label = date === today ? "Aujourd'hui" : date;
    html += `<div class="card-title" style="margin:12px 0 6px;font-size:11px;color:var(--muted);">${label}</div>`;
    html += groups[date].map(n => `
      <div class="note-item">
        <span class="note-tag tag-${n.tag}">${n.tag}</span>
        <div class="note-body">
          <div class="note-text">${escHtml(n.text)}</div>
          <div class="note-time">${n.time}</div>
          <div class="note-actions">
            <button class="btn btn-secondary" style="font-size:12px;padding:6px 10px;" onclick="treatNoteIA('${n.id}')">⚡ Traiter avec l'IA</button>
            <button class="note-del" onclick="deleteNote('${n.id}')">🗑</button>
          </div>
        </div>
      </div>
    `).join('');
  });

  el.innerHTML = html;
}

async function treatNoteIA(id) {
  const note = NOTES.find(n => n.id === id);
  if (!note) return;
  const prompts = {
    devis: `Tu es l'assistant de Mathieu LARUICCI, gérant d'Harmonie Électricité (spécialiste alarme, vidéosurveillance, contrôle d'accès, IRVE). Rédige un devis structuré et professionnel à partir de cette note : "${note.text}"`,
    client: `Rédige un SMS de rappel client chaleureux et professionnel de la part de Mathieu (Harmonie Électricité, 06 31 13 47 01) pour : "${note.text}"`,
    materiel: `Dresse la liste du matériel électrique nécessaire (références incluses si possible) pour : "${note.text}"`,
    chantier: `Rédige un compte-rendu de visite chantier structuré pour : "${note.text}"`,
    idee: `Développe cette idée pour un artisan électricien et propose des actions concrètes : "${note.text}"`
  };
  const prompt = prompts[note.tag] || prompts.idee;
  switchTab('ia');
  document.getElementById('iaInput').value = prompt;
  await askAI();
}

function generateDailySummary() {
  const today = new Date().toLocaleDateString('fr-FR');
  const todayNotes = NOTES.filter(n => n.date === today);
  if (!todayNotes.length) { showToast('Aucune note aujourd\'hui'); return; }

  const text = todayNotes.map(n => `[${n.tag}] ${n.text}`).join('\n');
  const prompt = `Voici mes notes de la journée (Mathieu LARUICCI, Harmonie Électricité, électricien artisan) :\n\n${text}\n\nFais un résumé structuré avec : 1) Actions urgentes pour ce soir, 2) À faire demain matin, 3) Relances clients à prévoir.`;

  document.getElementById('iaInput').value = prompt;
  switchTab('ia');
  askAI();
}

// ============================================================
//  CHECKLIST
// ============================================================
async function generateChecklist() {
  const today = new Date().toLocaleDateString('fr-FR');
  const notes = NOTES.filter(n => n.date === today);
  const urgentClients = CLIENTS.filter(c => !c.done && c.urgency === 'high');

  const items = [];
  if (urgentClients.length) {
    urgentClients.forEach(c => items.push({
      id: 'cl_' + c.id,
      label: `Rappeler ${c.name}`,
      detail: c.note,
      cat: 'client',
      done: false,
      skipped: false,
      createdAt: Date.now()
    }));
  }
  notes.forEach(n => {
    if (n.tag === 'devis') items.push({id:'ck_'+n.id, label:'Faire le devis', detail: n.text.slice(0,60)+'…', cat:'devis', done:false, skipped:false, createdAt: Date.now()});
    if (n.tag === 'materiel') items.push({id:'cm_'+n.id, label:'Commander le matériel', detail: n.text.slice(0,60)+'…', cat:'materiel', done:false, skipped:false, createdAt: Date.now()});
  });
  if (!items.length) {
    showToast('Aucune action détectée aujourd\'hui');
    return;
  }

  CHECKLIST = items;
  renderChecklist();
  schedulePush();
  switchTab('check');
}

function renderChecklist() {
  const el = document.getElementById('checklistItems');
  if (!CHECKLIST.length) {
    el.innerHTML = '<div class="empty-state">Clique sur ⚡ Générer pour créer ta checklist du soir</div>';
    updateCheckProgress();
    return;
  }

  // Find first undone/unskipped
  const activeIdx = CHECKLIST.findIndex(c => !c.done && !c.skipped);

  el.innerHTML = CHECKLIST.map((item, i) => {
    const isActive = i === activeIdx;
    const isLocked = !item.done && !item.skipped && i > activeIdx;
    let cls = 'check-item';
    if (item.done) cls += ' done';
    else if (item.skipped) cls += ' skipped';
    else if (isActive) cls += ' active';
    else if (isLocked) cls += ' locked';

    const numContent = item.done ? '✓' : item.skipped ? '→' : i+1;
    const btns = isActive ? `
      <div class="check-btns">
        <button class="btn btn-primary" style="font-size:12px;padding:8px 13px;" onclick="checkDone(${i})">✓ Traité</button>
        <button class="btn btn-secondary" style="font-size:12px;padding:8px 13px;" onclick="checkSkip(${i})">Reporter à demain</button>
        <button class="btn btn-secondary" style="font-size:12px;padding:8px 13px;" onclick="checkIA(${i})">⚡ Aide IA</button>
      </div>` : '';

    return `<div class="${cls}">
      <div class="check-item-top">
        <div class="check-number">${numContent}</div>
        <div class="check-label">${escHtml(item.label)}</div>
      </div>
      ${item.detail ? `<div class="check-detail">${escHtml(item.detail)}</div>` : ''}
      ${btns}
    </div>`;
  }).join('');

  updateCheckProgress();
}

function updateCheckProgress() {
  const total = CHECKLIST.length;
  const done = CHECKLIST.filter(c => c.done || c.skipped).length;
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('checkProgress').textContent = `${done}/${total}`;
  document.getElementById('checkProgressBar').style.width = pct + '%';
  const btn = document.getElementById('tomorrowBtn');
  btn.disabled = (done < total);
}

function checkDone(i) {
  CHECKLIST[i].done = true;
  renderChecklist();
  schedulePush();
}
function checkSkip(i) {
  CHECKLIST[i].skipped = true;
  renderChecklist();
  schedulePush();
}

var clientSearch = '';

function renderClients() {
  // Sync search input if it exists (without stealing focus)
  const inp = document.getElementById('clientSearchInput');
  if (inp && document.activeElement !== inp) inp.value = clientSearch;
  renderClientsList();

function renderClientsList() {
  const el = document.getElementById('clientsList');
  const countEl = document.getElementById('clientCount');
  if (!el) return;

  const q = clientSearch.trim().toLowerCase();

  const all = CLIENTS.filter(c => !q ||
    c.name.toLowerCase().includes(q) ||
    (c.phone||'').includes(q) ||
    (c.address||'').toLowerCase().includes(q) ||
    (c.email||'').toLowerCase().includes(q)
  );

  const sorted = [...all].sort((a,b) => {
    if (a.done !== b.done) return a.done ? 1 : -1;
    const order = { high:0, medium:1, low:2 };
    return (order[a.urgency]||1) - (order[b.urgency]||1);
  });

  if (countEl) countEl.textContent = sorted.length + ' client' + (sorted.length>1?'s':'') + (q?' trouvés':' au total');

  if (!CLIENTS.length) {
    el.innerHTML = '<div class="empty-state">Aucun client<br>Clique sur + ou importe depuis EBP</div>';
    return;
  }
  if (!sorted.length) {
    el.innerHTML = `<div class="empty-state">Aucun résultat pour « ${escHtml(clientSearch)} »</div>`;
    return;
  }

  el.innerHTML = sorted.map(c => {
    const isEBP = c.type === 'EBP';
    const urgencyLabel = c.urgency === 'high' ? '🔴 Urgent' : c.urgency === 'medium' ? '🟡 Cette sem.' : '';
    const tel = c.phone || '';
    const callBtn = tel ? `<a href="tel:${tel}" class="btn btn-secondary" style="font-size:12px;padding:7px 11px;text-decoration:none;">📞 Appeler</a>` : '';
    const smsBtn = tel ? `<a href="sms:${tel}" class="btn btn-secondary" style="font-size:12px;padding:7px 11px;text-decoration:none;">💬 SMS</a>` : '';

    return `<div class="client-item ${c.done ? 'done' : ''}">
      <div class="client-top">
        <div class="client-name">${escHtml(c.name)}</div>
        ${urgencyLabel ? `<span class="urgency-badge urgency-${c.urgency}">${urgencyLabel}</span>` : ''}
      </div>
      ${tel ? `<div class="client-type">📞 ${escHtml(tel)}</div>` : ''}
      ${c.address ? `<div class="client-type">📍 ${escHtml(c.address)}</div>` : ''}
      ${c.email ? `<div class="client-type">✉️ ${escHtml(c.email)}</div>` : ''}
      ${c.note ? `<div class="client-note">${escHtml(c.note)}</div>` : ''}
      <div class="client-btns">
        ${callBtn}${smsBtn}
        <button class="btn btn-secondary" style="font-size:12px;padding:7px 11px;" onclick="replyClientIA('${c.id}')">⚡ IA</button>
        ${!isEBP ? `<button class="btn ${c.done ? 'btn-secondary' : 'btn-green'}" style="font-size:12px;padding:7px 11px;" onclick="markClientDone('${c.id}')">${c.done ? '↩' : '✓'}</button>` : ''}
        ${!isEBP ? `<button class="btn btn-secondary" style="font-size:12px;padding:7px 11px;" onclick="deleteClient('${c.id}')">🗑</button>` : ''}
      </div>
    </div>`;
  }).join('');
}

const CC_KEY = 'harmonie_coffre_v1';
const CC = {
  store:null, data:null, dek:null, dekRaw:null, fbSeed:null,
  route:{name:'home',path:[],sectionId:null},
  search:'', unlocked:false, bioSupported:false
};
const ccEnc = new TextEncoder(), ccDec = new TextDecoder();
const ccSUB = (window.crypto && window.crypto.subtle) ? window.crypto.subtle : null;

// ── utils ──
function ccUid(){ const a=new Uint8Array(8); crypto.getRandomValues(a); return Array.from(a,b=>b.toString(16).padStart(2,'0')).join(''); }
function ccB64(buf){ const u=buf instanceof Uint8Array?buf:new Uint8Array(buf); let s=''; for(let i=0;i<u.length;i++) s+=String.fromCharCode(u[i]); return btoa(s); }
function ccUb64(str){ const s=atob(str); const u=new Uint8Array(s.length); for(let i=0;i<s.length;i++) u[i]=s.charCodeAt(i); return u; }
function ccEsc(s){ return (s==null?'':String(s)).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function ccSafeAttr(s){ return String(s==null?'':s).replace(/'/g,"&#39;").replace(/"/g,"&quot;"); }

// ── fallback XOR crypto ──
function cyrb53cc(str,seed){ seed=seed||0; let h1=0xdeadbeef^seed,h2=0x41c6ce57^seed; for(let i=0;i<str.length;i++){const ch=str.charCodeAt(i);h1=Math.imul(h1^ch,2654435761);h2=Math.imul(h2^ch,1597334677);} h1=Math.imul(h1^(h1>>>16),2246822507);h1^=Math.imul(h2^(h2>>>13),3266489909);h2=Math.imul(h2^(h2>>>16),2246822507);h2^=Math.imul(h1^(h1>>>13),3266489909);return 4294967296*(2097151&h2)+(h1>>>0); }
function mulberry32cc(a){ return function(){ a|=0; a=a+0x6D2B79F5|0; let t=Math.imul(a^a>>>15,1|a); t=t+Math.imul(t^t>>>7,61|t)^t; return((t^t>>>14)>>>0)/4294967296; }; }
function fbXorCC(dataU8,seedStr){ const seed=cyrb53cc(seedStr); const rnd=mulberry32cc(seed); const out=new Uint8Array(dataU8.length); for(let i=0;i<dataU8.length;i++) out[i]=dataU8[i]^Math.floor(rnd()*256); return out; }

// ── AES-GCM ──
async function ccPinKey(pin,salt){ const base=await ccSUB.importKey('raw',ccEnc.encode(pin),'PBKDF2',false,['deriveKey']); return ccSUB.deriveKey({name:'PBKDF2',salt,iterations:200000,hash:'SHA-256'},base,{name:'AES-GCM',length:256},false,['encrypt','decrypt']); }
async function ccAesEnc(key,dataU8){ const iv=crypto.getRandomValues(new Uint8Array(12)); const ct=await ccSUB.encrypt({name:'AES-GCM',iv},key,dataU8); return {iv:ccB64(iv),ct:ccB64(ct)}; }
async function ccAesDec(key,obj){ const pt=await ccSUB.decrypt({name:'AES-GCM',iv:ccUb64(obj.iv)},key,ccUb64(obj.ct)); return new Uint8Array(pt); }

// ── IndexedDB for Face ID key ──
function ccIdbOpen(){ return new Promise(function(res,rej){ const r=indexedDB.open('harmonie_coffre_idb',1); r.onupgradeneeded=function(){ r.result.createObjectStore('keys'); }; r.onsuccess=function(){ res(r.result); }; r.onerror=function(){ rej(r.error); }; }); }
async function ccIdbPut(k,v){ const db=await ccIdbOpen(); return new Promise(function(res,rej){ const tx=db.transaction('keys','readwrite'); tx.objectStore('keys').put(v,k); tx.oncomplete=function(){ res(); }; tx.onerror=function(){ rej(tx.error); }; }); }
async function ccIdbGet(k){ const db=await ccIdbOpen(); return new Promise(function(res,rej){ const tx=db.transaction('keys','readonly'); const rq=tx.objectStore('keys').get(k); rq.onsuccess=function(){ res(rq.result); }; rq.onerror=function(){ rej(rq.error); }; }); }
async function ccIdbDel(k){ const db=await ccIdbOpen(); return new Promise(function(res){ const tx=db.transaction('keys','readwrite'); tx.objectStore('keys').delete(k); tx.oncomplete=function(){ res(); }; tx.onerror=function(){ res(); }; }); }

// ── Supabase sync for coffre ──
async function ccSbPush(){
  if(!CC.store) return false;
  try {
    // Store the entire encrypted store object + timestamp
    const payload = { store: CC.store, ts: Date.now() };
    const r = await fetch(SUPA_URL+'/rest/v1/coffre', {
      method:'POST',
      headers:{...SB_HEADERS,'Prefer':'resolution=merge-duplicates,return=minimal'},
      body:JSON.stringify({id:'coffre_main', payload:payload})
    });
    return r.ok || r.status===201;
  } catch(e){ return false; }
}
async function ccSbPull(){
  try {
    const r = await fetch(SUPA_URL+'/rest/v1/coffre?id=eq.coffre_main&select=payload', {headers:SB_HEADERS});
    if(!r.ok) return null;
    const rows = await r.json();
    if(!Array.isArray(rows)||!rows.length||!rows[0].payload) return null;
    // Returns { store, ts }
    return rows[0].payload;
  } catch(e){ return null; }
}

// ── persist ──
function ccLoad(){ try{ const r=localStorage.getItem(CC_KEY); return r?JSON.parse(r):null; } catch(e){ return null; } }
function ccPersist(){ localStorage.setItem(CC_KEY,JSON.stringify(CC.store)); }
async function ccSaveData(){
  const json=ccEnc.encode(JSON.stringify(CC.data));
  if(CC.store.secure){ CC.store.vault=await ccAesEnc(CC.dek,json); }
  else { CC.store.vault={fb:ccB64(fbXorCC(json,CC.fbSeed))}; }
  CC.store._ts = Date.now(); // timestamp for sync comparison
  ccPersist();
  await ccSbPush();
}

// ── create/unlock ──
async function ccCreate(pin){
  const data={residences:[]};
  if(ccSUB){
    const salt=crypto.getRandomValues(new Uint8Array(16));
    const pinKey=await ccPinKey(pin,salt);
    const dekRaw=crypto.getRandomValues(new Uint8Array(32));
    const dek=await ccSUB.importKey('raw',dekRaw,{name:'AES-GCM'},false,['encrypt','decrypt']);
    const json=ccEnc.encode(JSON.stringify(data));
    CC.store={v:1,secure:true,salt:ccB64(salt),pinWrappedDek:await ccAesEnc(pinKey,dekRaw),vault:await ccAesEnc(dek,json),bio:null};
    CC.dek=dek; CC.dekRaw=dekRaw;
  } else {
    const saltB=ccB64(crypto.getRandomValues(new Uint8Array(16)));
    const seed=saltB+'|'+pin;
    const json=ccEnc.encode(JSON.stringify(data));
    CC.store={v:1,secure:false,salt:saltB,pinCheck:cyrb53cc('chk|'+seed),vault:{fb:ccB64(fbXorCC(json,seed))},bio:null};
    CC.fbSeed=seed;
  }
  CC.data=data; CC.unlocked=true; ccPersist();
  await ccSbPush();
}

async function ccUnlockPin(pin){
  if(CC.store.secure){
    const salt=ccUb64(CC.store.salt);
    const pinKey=await ccPinKey(pin,salt);
    let dekRaw;
    try{ dekRaw=await ccAesDec(pinKey,CC.store.pinWrappedDek); } catch(e){ return false; }
    const dek=await ccSUB.importKey('raw',dekRaw,{name:'AES-GCM'},false,['encrypt','decrypt']);
    const json=await ccAesDec(dek,CC.store.vault);
    CC.data=JSON.parse(ccDec.decode(json)); CC.dek=dek; CC.dekRaw=dekRaw; CC.unlocked=true; return true;
  } else {
    const seed=CC.store.salt+'|'+pin;
    if(cyrb53cc('chk|'+seed)!==CC.store.pinCheck) return false;
    const json=fbXorCC(ccUb64(CC.store.vault.fb),seed);
    CC.data=JSON.parse(ccDec.decode(json)); CC.fbSeed=seed; CC.unlocked=true; return true;
  }
}

// ── Face ID ──
async function ccCheckBioSupport(){
  try {
    if(window.PublicKeyCredential && window.isSecureContext &&
       PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable){
      CC.bioSupported = await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();
    }
  } catch(e){ CC.bioSupported=false; }
}

async function ccEnableBio(){
  if(!ccSUB){ showToast('Face ID indisponible — HTTPS requis'); return false; }
  if(!CC.bioSupported){ showToast('Face ID non disponible sur cet appareil'); return false; }
  try {
    const userId=crypto.getRandomValues(new Uint8Array(16));
    const challenge=crypto.getRandomValues(new Uint8Array(32));
    const cred=await navigator.credentials.create({publicKey:{
      challenge,
      rp:{name:'Harmonie Coffre'},
      user:{id:userId,name:'coffre-'+ccUid(),displayName:'Coffre Codes'},
      pubKeyCredParams:[{type:'public-key',alg:-7},{type:'public-key',alg:-257}],
      authenticatorSelection:{authenticatorAttachment:'platform',userVerification:'required',residentKey:'preferred'},
      timeout:60000,attestation:'none'
    }});
    // Use extractable key so it survives Safari session restarts
    const bioKeyRaw = crypto.getRandomValues(new Uint8Array(32));
    const bioKey = await ccSUB.importKey('raw', bioKeyRaw, {name:'AES-GCM'}, true, ['encrypt','decrypt']);
    // Store raw bytes in IndexedDB (not the CryptoKey object — more reliable)
    await ccIdbPut('ccBioKeyRaw', ccB64(bioKeyRaw));
    const wrappedDek = await ccAesEnc(bioKey, CC.dekRaw);
    CC.store.bio = {enabled:true, credentialId:ccB64(new Uint8Array(cred.rawId)), wrappedDek};
    CC.store._ts = Date.now();
    ccPersist(); await ccSbPush();
    showToast('Face ID activé ✓'); return true;
  } catch(e){ showToast('Activation Face ID annulée'); return false; }
}

async function ccUnlockBio(){
  if(!CC.store||!CC.store.bio||!CC.store.bio.enabled) return false;
  try {
    const idU = ccUb64(CC.store.bio.credentialId);
    const challenge = crypto.getRandomValues(new Uint8Array(32));
    // Ask Face ID to verify
    await navigator.credentials.get({publicKey:{
      challenge, timeout:60000, userVerification:'required',
      allowCredentials:[{type:'public-key', id:idU}]
    }});
    // Face ID validated — retrieve raw key from IndexedDB
    const bioKeyB64 = await ccIdbGet('ccBioKeyRaw');
    if(!bioKeyB64){ showToast('Clé Face ID introuvable — utilisez le PIN'); return false; }
    const bioKeyRaw = ccUb64(bioKeyB64);
    const bioKey = await ccSUB.importKey('raw', bioKeyRaw, {name:'AES-GCM'}, false, ['encrypt','decrypt']);
    const dekRaw = await ccAesDec(bioKey, CC.store.bio.wrappedDek);
    const dek = await ccSUB.importKey('raw', dekRaw, {name:'AES-GCM'}, false, ['encrypt','decrypt']);
    const json = await ccAesDec(dek, CC.store.vault);
    CC.data=JSON.parse(ccDec.decode(json)); CC.dek=dek; CC.dekRaw=dekRaw; CC.unlocked=true; return true;
  } catch(e){ return false; }
}

// ── Supabase init for coffre ──
async function ccInitSync(){
  // Pull encrypted store from Supabase
  const remote = await ccSbPull();
  if(!remote || !remote.store) return;

  const localStore = ccLoad();
  const localTs = (localStore && localStore._ts) ? localStore._ts : 0;
  const remoteTs = remote.ts || 0;

  if(remoteTs > localTs){
    // Remote is newer — overwrite local with remote encrypted store
    remote.store._ts = remoteTs;
    localStorage.setItem(CC_KEY, JSON.stringify(remote.store));
    CC.store = remote.store;
  }
}

// ── schema SVG ──
function ccDotPos(i){ const col=(i-1)%3, row=Math.floor((i-1)/3); return {x:40+col*70,y:40+row*70}; }
function ccSchemaSVG(seq,interactive){
  seq=(seq||[]).map(Number).filter(function(n){ return n>=1&&n<=9; });
  let pts=''; for(let i=0;i<seq.length;i++){ const p=ccDotPos(seq[i]); pts+=p.x+','+p.y+' '; }
  const line=seq.length>1?'<polyline points="'+pts.trim()+'" fill="none" stroke="#f5a623" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>':'';
  let dots='';
  for(let i=1;i<=9;i++){
    const p=ccDotPos(i); const order=seq.indexOf(i); const used=order>=0;
    const fill=used?'#f5a623':'#222'; const stroke=used?'#f5a623':'#2a2a2a'; const tc=used?'#000':'#888';
    const tap=interactive?' style="cursor:pointer" onclick="ccSchemaTap('+i+')"':'';
    dots+='<g'+tap+'><circle cx="'+p.x+'" cy="'+p.y+'" r="22" fill="'+fill+'" stroke="'+stroke+'" stroke-width="2"/>'
      +'<text x="'+p.x+'" y="'+(p.y+5)+'" text-anchor="middle" font-size="14" font-weight="700" fill="'+tc+'" font-family="-apple-system,sans-serif">'+(used?(order+1):i)+'</text></g>';
  }
  return '<svg viewBox="0 0 220 220" width="100%" style="max-width:220px" xmlns="http://www.w3.org/2000/svg">'+line+dots+'</svg>';
}

function ccAddResidence(){ ccPromptText('Nouveau client / site','Nom du client ou du site','',function(v){ if(!v.trim())return; CC.data.residences.push(ccNewNode(v.trim())); ccSaveData().then(function(){ ccRenderHome(); }); }); }
function ccAddChild(){ const node=ccFind(CC.route.path); ccPromptText('Nouvelle sous-fiche','Ex. Montée A, Bâtiment…','',function(v){ if(!v.trim())return; node.children.push(ccNewNode(v.trim())); ccSaveData().then(function(){ ccRenderNode(); }); }); }
function ccAddSection(){ const node=ccFind(CC.route.path); ccPromptText('Nouvel équipement','Ex. Alarme, Interphone…','',function(v){ if(!v.trim())return; node.sections.push(ccNewSection(v.trim())); ccSaveData().then(function(){ ccOpenSection(node.sections[node.sections.length-1].id); }); },['Alarme','Interphone','Portail','Vidéosurveillance','Digicode','Contrôle accès']); }
function ccRenameNode(){ const node=ccFind(CC.route.path); ccPromptText('Renommer','Nom',node.name,function(v){ if(!v.trim())return; node.name=v.trim(); ccSaveData().then(function(){ ccRenderNode(); }); }); }
function ccRenameSection(){ const sec=ccCurSection(); ccPromptText('Renommer','Nom',sec.name,function(v){ if(!v.trim())return; sec.name=v.trim(); ccSaveData().then(function(){ ccRenderSection(); }); }); }
function ccDeleteNode(){ const p=CC.route.path.slice(); const id=p.pop(); ccConfirmDlg('Supprimer cette fiche ?',function(){ const parent=p.length?ccFind(p):null; const list=parent?parent.children:CC.data.residences; const i=list.findIndex(function(n){ return n.id===id; }); if(i>=0)list.splice(i,1); ccSaveData().then(function(){ CC.route=p.length?{name:'node',path:p,sectionId:null}:{name:'home',path:[],sectionId:null}; p.length?ccRenderNode():ccRenderHome(); }); }); }
function ccDeleteSection(){ const node=ccFind(CC.route.path); ccConfirmDlg('Supprimer cet équipement ?',function(){ const i=node.sections.findIndex(function(s){ return s.id===CC.route.sectionId; }); if(i>=0)node.sections.splice(i,1); ccSaveData().then(function(){ ccGoUp(); }); }); }
function ccEditNotes(){ const sec=ccCurSection(); ccPromptTextarea('Notes libres','Remarques, particularités…',sec.notes,function(v){ sec.notes=v; ccSaveData().then(function(){ ccRenderSection(); }); }); }

// ── settings ──
function ccOpenSettings(){
  const bioOn=CC.store&&CC.store.bio&&CC.store.bio.enabled;
  const overlay=document.createElement('div'); overlay.className='cc-modal'; overlay.id='cc-modal';
  overlay.innerHTML='<div class="cc-sheet"><h3>⚙️ Coffre — Réglages</h3>'
    +'<div class="card" style="margin-bottom:12px;">'
    +(CC.bioSupported&&CC.store&&CC.store.secure
      ?(bioOn
        ?'<div class="cc-row" onclick="ccCloseModal();ccDisableBio().then(ccOpenSettings)"><div class="cc-ic">👤</div><div class="cc-tx"><div class="cc-nm">Face ID activé</div><div class="cc-sub">Toucher pour désactiver</div></div></div>'
        :'<div class="cc-row" onclick="ccCloseModal();ccEnableBio().then(function(ok){ if(ok) ccOpenSettings(); })"><div class="cc-ic">👤</div><div class="cc-tx"><div class="cc-nm">Activer Face ID</div><div class="cc-sub">Déverrouillage par reconnaissance du visage</div></div><div class="cc-chev">›</div></div>')
      :'<div class="cc-row"><div class="cc-ic">👤</div><div class="cc-tx"><div class="cc-nm">Face ID</div><div class="cc-sub">Ajouter l\'app à l\'écran d\'accueil (Safari) pour activer</div></div></div>')
    +'<div class="cc-row" onclick="ccChangePinDialog()"><div class="cc-ic">🔑</div><div class="cc-tx"><div class="cc-nm">Changer le code PIN</div></div><div class="cc-chev">›</div></div>'
    +'<div class="cc-row" onclick="ccExportBackup()"><div class="cc-ic">⬇️</div><div class="cc-tx"><div class="cc-nm">Exporter une sauvegarde</div><div class="cc-sub">Fichier JSON chiffré</div></div><div class="cc-chev">›</div></div>'
    +'<div class="cc-row" onclick="ccCloseModal();ccLock()"><div class="cc-ic">🔒</div><div class="cc-tx"><div class="cc-nm">Verrouiller le coffre</div></div><div class="cc-chev">›</div></div>'
    +'</div>'
    +'<button class="cc-danger-lnk" onclick="ccResetAll()">Tout effacer (réinitialiser)</button>'
    +'<div class="cc-small">Codes chiffrés AES-256, synchronisés de façon sécurisée.</div>'
    +'<button class="btn btn-secondary btn-full" style="margin-top:12px;" onclick="ccCloseModal()">Fermer</button></div>';
  document.body.appendChild(overlay);
}
function ccExportBackup(){ const blob=new Blob([JSON.stringify(CC.store,null,2)],{type:'application/json'}); const url=URL.createObjectURL(blob); const a=document.createElement('a'); const d=new Date(); const stamp=d.getFullYear()+('0'+(d.getMonth()+1)).slice(-2)+('0'+d.getDate()).slice(-2); a.href=url; a.download='coffre-codes-'+stamp+'.json'; document.body.appendChild(a); a.click(); a.remove(); setTimeout(function(){ URL.revokeObjectURL(url); },1500); showToast('Sauvegarde exportée'); }
function ccResetAll(){ ccConfirmDlg('Effacer définitivement tous les codes ?',function(){ localStorage.removeItem(CC_KEY); ccIdbDel('ccBioKey'); CC.store=null; CC.data=null; CC.dek=null; CC.dekRaw=null; CC.fbSeed=null; CC.unlocked=false; ccCloseModal(); ccRenderLock(); }); }
function ccChangePinDialog(){ ccCloseModal(); ccPromptPin('Nouveau code PIN',function(p1){ ccPromptPin('Confirmez le code',function(p2){ if(p1!==p2){ showToast('Codes différents'); return; } ccChangePin(p2).then(function(){ showToast('Code modifié'); }); }); }); }
async function ccChangePin(newPin){ if(CC.store.secure){ const salt=crypto.getRandomValues(new Uint8Array(16)); const pinKey=await ccPinKey(newPin,salt); CC.store.salt=ccB64(salt); CC.store.pinWrappedDek=await ccAesEnc(pinKey,CC.dekRaw); } else { const saltB=ccB64(crypto.getRandomValues(new Uint8Array(16))); const seed=saltB+'|'+newPin; const json=ccEnc.encode(JSON.stringify(CC.data)); CC.store.salt=saltB; CC.store.pinCheck=cyrb53cc('chk|'+seed); CC.store.vault={fb:ccB64(fbXorCC(json,seed))}; CC.fbSeed=seed; } ccPersist(); await ccSbPush(); }

// ── generic dialogs ──
function ccCloseModal(){ const m=document.getElementById('cc-modal'); if(m) m.remove(); }
function ccPromptText(title,placeholder,value,onok,presets){ const overlay=document.createElement('div'); overlay.className='cc-modal'; overlay.id='cc-modal'; let ch=''; if(presets){ for(let i=0;i<presets.length;i++) ch+='<button class="cc-chip" onclick="document.getElementById(\'cc-ptIn\').value=\''+presets[i]+'\'">'+presets[i]+'</button>'; } overlay.innerHTML='<div class="cc-sheet"><h3>'+ccEsc(title)+'</h3><input type="text" id="cc-ptIn" placeholder="'+ccEsc(placeholder)+'" value="'+ccEsc(value)+'">'+(ch?'<div class="cc-chips">'+ch+'</div>':'')+'<div style="display:flex;gap:8px;margin-top:12px;"><button class="btn btn-secondary btn-full" onclick="ccCloseModal()">Annuler</button><button class="btn btn-primary btn-full" id="cc-ptOk">Valider</button></div></div>'; document.body.appendChild(overlay); setTimeout(function(){ const i=document.getElementById('cc-ptIn'); if(i) i.focus(); },80); document.getElementById('cc-ptOk').onclick=function(){ const v=document.getElementById('cc-ptIn').value; ccCloseModal(); onok(v); }; }
function ccPromptTextarea(title,placeholder,value,onok){ const overlay=document.createElement('div'); overlay.className='cc-modal'; overlay.id='cc-modal'; overlay.innerHTML='<div class="cc-sheet"><h3>'+ccEsc(title)+'</h3><textarea id="cc-ptArea" placeholder="'+ccEsc(placeholder)+'">'+ccEsc(value)+'</textarea><div style="display:flex;gap:8px;margin-top:12px;"><button class="btn btn-secondary btn-full" onclick="ccCloseModal()">Annuler</button><button class="btn btn-primary btn-full" id="cc-ptOk">Enregistrer</button></div></div>'; document.body.appendChild(overlay); setTimeout(function(){ const a=document.getElementById('cc-ptArea'); if(a) a.focus(); },80); document.getElementById('cc-ptOk').onclick=function(){ const v=document.getElementById('cc-ptArea').value; ccCloseModal(); onok(v); }; }
function ccConfirmDlg(msg,onok){ const overlay=document.createElement('div'); overlay.className='cc-modal'; overlay.id='cc-modal'; overlay.innerHTML='<div class="cc-sheet"><h3>Confirmation</h3><p style="color:var(--muted);font-size:14px;">'+ccEsc(msg)+'</p><div style="display:flex;gap:8px;margin-top:12px;"><button class="btn btn-secondary btn-full" onclick="ccCloseModal()">Annuler</button><button class="btn btn-danger btn-full" id="cc-cfOk">Supprimer</button></div></div>'; document.body.appendChild(overlay); document.getElementById('cc-cfOk').onclick=function(){ ccCloseModal(); onok(); }; }
function ccPromptPin(title,onok){ let buf=''; const overlay=document.createElement('div'); overlay.className='cc-modal'; overlay.id='cc-modal'; overlay.innerHTML='<div class="cc-sheet" style="text-align:center"><h3>'+ccEsc(title)+'</h3><div class="cc-dots" id="cc-ppDots" style="justify-content:center;margin:6px auto 16px;"><div class="cd"></div><div class="cd"></div><div class="cd"></div><div class="cd"></div></div><div class="cc-pad" style="margin:0 auto;"><button class="cc-key" data-n="1">1</button><button class="cc-key" data-n="2">2</button><button class="cc-key" data-n="3">3</button><button class="cc-key" data-n="4">4</button><button class="cc-key" data-n="5">5</button><button class="cc-key" data-n="6">6</button><button class="cc-key" data-n="7">7</button><button class="cc-key" data-n="8">8</button><button class="cc-key" data-n="9">9</button><button class="cc-key blank"></button><button class="cc-key" data-n="0">0</button><button class="cc-key fn" id="cc-ppDel">⌫</button></div><div style="margin-top:12px;"><button class="btn btn-secondary" style="width:auto;padding:9px 18px;" onclick="ccCloseModal()">Annuler</button></div></div>'; document.body.appendChild(overlay); function paint(){ const ds=document.getElementById('cc-ppDots'); if(!ds)return; const k=[...ds.children]; for(let i=0;i<4;i++) k[i]&&k[i].classList.toggle('f',i<buf.length); } overlay.querySelectorAll('.cc-key[data-n]').forEach(function(k){ k.onclick=function(){ if(buf.length>=4)return; buf+=k.dataset.n; paint(); if(buf.length===4){ const v=buf; setTimeout(function(){ ccCloseModal(); onok(v); },120); } }; }); document.getElementById('cc-ppDel').onclick=function(){ buf=buf.slice(0,-1); paint(); }; }

// ── Agenda Google Calendar tab ──
function ccRenderAgenda(){
  const root=document.getElementById('cc-root'); if(!root) return;
  root.innerHTML='<div class="cc-topbar"><div class="cc-topbar-title">📅 Agenda</div><button class="cc-gear" onclick="loadAgenda()">🔄</button></div>'
    +'<div id="cc-agenda-content" style="padding:16px;"><div class="empty-state">Chargement…</div></div>';
  loadAgenda();
}

// ── hook into switchTab ──
(function(){
  var orig=switchTab;
  switchTab=function(t){
    orig(t);
    if(t==='coffre'){
      CC.store=ccLoad();
      ccCheckBioSupport().then(function(){
        if(!CC.store||!CC.unlocked){
          ccInitSync().then(function(){
            CC.store=ccLoad();
            ccRenderLock();
          });
        } else {
          if(CC.route.name==='home') ccRenderHome();
          else if(CC.route.name==='node') ccRenderNode();
          else if(CC.route.name==='section') ccRenderSection();
        }
      });
    }
  };
})();

// ── add biobtn CSS ──
(function(){
  const s=document.createElement('style');
  s.textContent='.cc-biobtn{background:none;border:none;color:var(--accent);font-weight:600;font-size:15px;margin-top:14px;cursor:pointer;display:flex;align-items:center;gap:8px;font-family:"DM Sans",sans-serif;}';
  document.head.appendChild(s);
})();

</script>
