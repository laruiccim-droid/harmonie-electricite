//  COFFRE CODES — Face ID + Supabase sync
// ============================================================
const CC_KEY = 'harmonie_coffre_v1';
const CC = {
  store:null, data:null, dek:null, dekRaw:null, fbSeed:null,
  route:{name:'home',path:[],sectionId:null},
  search:'', unlocked:false, bioSupported:false
};
const ccEnc = new TextEncoder(), ccDec = new TextDecoder();
const ccSUB = (window.crypto && window.crypto.subtle) ? window.crypto.subtle : null;

// ── utils ──
function ccUid(){ const a=new Uint8Array(8); crypto.getRandomValues(a); return Array.from(a,b=>b.toString(16).padStart(2,'0')).join(''); }
function ccB64(buf){ const u=buf instanceof Uint8Array?buf:new Uint8Array(buf); let s=''; for(let i=0;i<u.length;i++) s+=String.fromCharCode(u[i]); return btoa(s); }
function ccUb64(str){ const s=atob(str); const u=new Uint8Array(s.length); for(let i=0;i<s.length;i++) u[i]=s.charCodeAt(i); return u; }
function ccEsc(s){ return (s==null?'':String(s)).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function ccSafeAttr(s){ return String(s==null?'':s).replace(/'/g,"&#39;").replace(/"/g,"&quot;"); }

// ── fallback XOR crypto ──
function cyrb53cc(str,seed){ seed=seed||0; let h1=0xdeadbeef^seed,h2=0x41c6ce57^seed; for(let i=0;i<str.length;i++){const ch=str.charCodeAt(i);h1=Math.imul(h1^ch,2654435761);h2=Math.imul(h2^ch,1597334677);} h1=Math.imul(h1^(h1>>>16),2246822507);h1^=Math.imul(h2^(h2>>>13),3266489909);h2=Math.imul(h2^(h2>>>16),2246822507);h2^=Math.imul(h1^(h1>>>13),3266489909);return 4294967296*(2097151&h2)+(h1>>>0); }
function mulberry32cc(a){ return function(){ a|=0; a=a+0x6D2B79F5|0; let t=Math.imul(a^a>>>15,1|a); t=t+Math.imul(t^t>>>7,61|t)^t; return((t^t>>>14)>>>0)/4294967296; }; }
function fbXorCC(dataU8,seedStr){ const seed=cyrb53cc(seedStr); const rnd=mulberry32cc(seed); const out=new Uint8Array(dataU8.length); for(let i=0;i<dataU8.length;i++) out[i]=dataU8[i]^Math.floor(rnd()*256); return out; }

// ── AES-GCM ──
async function ccPinKey(pin,salt){ const base=await ccSUB.importKey('raw',ccEnc.encode(pin),'PBKDF2',false,['deriveKey']); return ccSUB.deriveKey({name:'PBKDF2',salt,iterations:200000,hash:'SHA-256'},base,{name:'AES-GCM',length:256},false,['encrypt','decrypt']); }
async function ccAesEnc(key,dataU8){ const iv=crypto.getRandomValues(new Uint8Array(12)); const ct=await ccSUB.encrypt({name:'AES-GCM',iv},key,dataU8); return {iv:ccB64(iv),ct:ccB64(ct)}; }
async function ccAesDec(key,obj){ const pt=await ccSUB.decrypt({name:'AES-GCM',iv:ccUb64(obj.iv)},key,ccUb64(obj.ct)); return new Uint8Array(pt); }

// ── IndexedDB for Face ID key ──
function ccIdbOpen(){ return new Promise(function(res,rej){ const r=indexedDB.open('harmonie_coffre_idb',1); r.onupgradeneeded=function(){ r.result.createObjectStore('keys'); }; r.onsuccess=function(){ res(r.result); }; r.onerror=function(){ rej(r.error); }; }); }
async function ccIdbPut(k,v){ const db=await ccIdbOpen(); return new Promise(function(res,rej){ const tx=db.transaction('keys','readwrite'); tx.objectStore('keys').put(v,k); tx.oncomplete=function(){ res(); }; tx.onerror=function(){ rej(tx.error); }; }); }
async function ccIdbGet(k){ const db=await ccIdbOpen(); return new Promise(function(res,rej){ const tx=db.transaction('keys','readonly'); const rq=tx.objectStore('keys').get(k); rq.onsuccess=function(){ res(rq.result); }; rq.onerror=function(){ rej(rq.error); }; }); }
async function ccIdbDel(k){ const db=await ccIdbOpen(); return new Promise(function(res){ const tx=db.transaction('keys','readwrite'); tx.objectStore('keys').delete(k); tx.oncomplete=function(){ res(); }; tx.onerror=function(){ res(); }; }); }

// ── Supabase sync for coffre ──
async function ccSbPush(){
  if(!CC.store) return false;
  try {
    // Store the entire encrypted store object + timestamp
    const payload = { store: CC.store, ts: Date.now() };
    const r = await fetch(SUPA_URL+'/rest/v1/coffre', {
      method:'POST',
      headers:{...SB_HEADERS,'Prefer':'resolution=merge-duplicates,return=minimal'},
      body:JSON.stringify({id:'coffre_main', payload:payload})
    });
    return r.ok || r.status===201;
  } catch(e){ return false; }
}
async function ccSbPull(){
  try {
    const r = await fetch(SUPA_URL+'/rest/v1/coffre?id=eq.coffre_main&select=payload', {headers:SB_HEADERS});
    if(!r.ok) return null;
    const rows = await r.json();
    if(!Array.isArray(rows)||!rows.length||!rows[0].payload) return null;
    // Returns { store, ts }
    return rows[0].payload;
  } catch(e){ return null; }
}

// ── persist ──
function ccLoad(){ try{ const r=localStorage.getItem(CC_KEY); return r?JSON.parse(r):null; } catch(e){ return null; } }
function ccPersist(){ localStorage.setItem(CC_KEY,JSON.stringify(CC.store)); }
async function ccSaveData(){
  const json=ccEnc.encode(JSON.stringify(CC.data));
  if(CC.store.secure){ CC.store.vault=await ccAesEnc(CC.dek,json); }
  else { CC.store.vault={fb:ccB64(fbXorCC(json,CC.fbSeed))}; }
  CC.store._ts = Date.now(); // timestamp for sync comparison
  ccPersist();
  await ccSbPush();
}

// ── create/unlock ──
async function ccCreate(pin){
  const data={residences:[]};
  if(ccSUB){
    const salt=crypto.getRandomValues(new Uint8Array(16));
    const pinKey=await ccPinKey(pin,salt);
    const dekRaw=crypto.getRandomValues(new Uint8Array(32));
    const dek=await ccSUB.importKey('raw',dekRaw,{name:'AES-GCM'},false,['encrypt','decrypt']);
    const json=ccEnc.encode(JSON.stringify(data));
    CC.store={v:1,secure:true,salt:ccB64(salt),pinWrappedDek:await ccAesEnc(pinKey,dekRaw),vault:await ccAesEnc(dek,json),bio:null};
    CC.dek=dek; CC.dekRaw=dekRaw;
  } else {
    const saltB=ccB64(crypto.getRandomValues(new Uint8Array(16)));
    const seed=saltB+'|'+pin;
    const json=ccEnc.encode(JSON.stringify(data));
    CC.store={v:1,secure:false,salt:saltB,pinCheck:cyrb53cc('chk|'+seed),vault:{fb:ccB64(fbXorCC(json,seed))},bio:null};
    CC.fbSeed=seed;
  }
  CC.data=data; CC.unlocked=true; ccPersist();
  await ccSbPush();
}

async function ccUnlockPin(pin){
  if(CC.store.secure){
    const salt=ccUb64(CC.store.salt);
    const pinKey=await ccPinKey(pin,salt);
    let dekRaw;
    try{ dekRaw=await ccAesDec(pinKey,CC.store.pinWrappedDek); } catch(e){ return false; }
    const dek=await ccSUB.importKey('raw',dekRaw,{name:'AES-GCM'},false,['encrypt','decrypt']);
    const json=await ccAesDec(dek,CC.store.vault);
    CC.data=JSON.parse(ccDec.decode(json)); CC.dek=dek; CC.dekRaw=dekRaw; CC.unlocked=true; return true;
  } else {
    const seed=CC.store.salt+'|'+pin;
    if(cyrb53cc('chk|'+seed)!==CC.store.pinCheck) return false;
    const json=fbXorCC(ccUb64(CC.store.vault.fb),seed);
    CC.data=JSON.parse(ccDec.decode(json)); CC.fbSeed=seed; CC.unlocked=true; return true;
  }
}

// ── Face ID ──
async function ccCheckBioSupport(){
  try {
    if(window.PublicKeyCredential && window.isSecureContext &&
       PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable){
      CC.bioSupported = await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();
    }
  } catch(e){ CC.bioSupported=false; }
}

async function ccEnableBio(){
  if(!ccSUB){ showToast('Face ID indisponible — HTTPS requis'); return false; }
  if(!CC.bioSupported){ showToast('Face ID non disponible sur cet appareil'); return false; }
  try {
    const userId=crypto.getRandomValues(new Uint8Array(16));
    const challenge=crypto.getRandomValues(new Uint8Array(32));
    const cred=await navigator.credentials.create({publicKey:{
      challenge,
      rp:{name:'Harmonie Coffre'},
      user:{id:userId,name:'coffre-'+ccUid(),displayName:'Coffre Codes'},
      pubKeyCredParams:[{type:'public-key',alg:-7},{type:'public-key',alg:-257}],
      authenticatorSelection:{authenticatorAttachment:'platform',userVerification:'required',residentKey:'preferred'},
      timeout:60000,attestation:'none'
    }});
    // Use extractable key so it survives Safari session restarts
    const bioKeyRaw = crypto.getRandomValues(new Uint8Array(32));
    const bioKey = await ccSUB.importKey('raw', bioKeyRaw, {name:'AES-GCM'}, true, ['encrypt','decrypt']);
    // Store raw bytes in IndexedDB (not the CryptoKey object — more reliable)
    await ccIdbPut('ccBioKeyRaw', ccB64(bioKeyRaw));
    const wrappedDek = await ccAesEnc(bioKey, CC.dekRaw);
    CC.store.bio = {enabled:true, credentialId:ccB64(new Uint8Array(cred.rawId)), wrappedDek};
    CC.store._ts = Date.now();
    ccPersist(); await ccSbPush();
    showToast('Face ID activé ✓'); return true;
  } catch(e){ showToast('Activation Face ID annulée'); return false; }
}

async function ccUnlockBio(){
  if(!CC.store||!CC.store.bio||!CC.store.bio.enabled) return false;
  try {
    const idU = ccUb64(CC.store.bio.credentialId);
    const challenge = crypto.getRandomValues(new Uint8Array(32));
    // Ask Face ID to verify
    await navigator.credentials.get({publicKey:{
      challenge, timeout:60000, userVerification:'required',
      allowCredentials:[{type:'public-key', id:idU}]
    }});
    // Face ID validated — retrieve raw key from IndexedDB
    const bioKeyB64 = await ccIdbGet('ccBioKeyRaw');
    if(!bioKeyB64){ showToast('Clé Face ID introuvable — utilisez le PIN'); return false; }
    const bioKeyRaw = ccUb64(bioKeyB64);
    const bioKey = await ccSUB.importKey('raw', bioKeyRaw, {name:'AES-GCM'}, false, ['encrypt','decrypt']);
    const dekRaw = await ccAesDec(bioKey, CC.store.bio.wrappedDek);
    const dek = await ccSUB.importKey('raw', dekRaw, {name:'AES-GCM'}, false, ['encrypt','decrypt']);
    const json = await ccAesDec(dek, CC.store.vault);
    CC.data=JSON.parse(ccDec.decode(json)); CC.dek=dek; CC.dekRaw=dekRaw; CC.unlocked=true; return true;
  } catch(e){ return false; }
}

async function ccDisableBio(){ CC.store.bio=null; await ccIdbDel('ccBioKeyRaw'); ccPersist(); await ccSbPush(); showToast('Face ID désactivé'); }

function ccLock(){ CC.data=null; CC.dek=null; CC.dekRaw=null; CC.fbSeed=null; CC.unlocked=false; CC.route={name:'home',path:[],sectionId:null}; ccRenderLock(); }

async function ccTryBio(){
  const ok=await ccUnlockBio();
  if(ok) ccRenderHome();
  else { const lm=document.getElementById('cc-lockmsg'); if(lm) lm.textContent='Face ID échoué — entrez votre code'; }
}

function ccPaintDots(){ const ds=document.getElementById('cc-dots'); if(!ds) return; const kids=[...ds.children]; for(let i=0;i<4;i++) kids[i]&&kids[i].classList.toggle('f',i<ccPinBuf.length); }
function ccPin(n){ if(ccPinBuf.length>=4) return; ccPinBuf+=String(n); ccPaintDots(); if(ccPinBuf.length===4) setTimeout(ccPinComplete,120); }
function ccPinDel(){ ccPinBuf=ccPinBuf.slice(0,-1); ccPaintDots(); }
function ccPinErr(msg){ const ds=document.getElementById('cc-dots'); if(!ds)return; ds.classList.add('err'); const lk=document.querySelector('.cc-lock'); if(lk) lk.classList.add('cc-shake'); const lm=document.getElementById('cc-lockmsg'); if(lm) lm.textContent=msg||''; setTimeout(function(){ ds.classList.remove('err'); if(lk) lk.classList.remove('cc-shake'); ccPinBuf=''; ccPaintDots(); },450); }

async function ccPinComplete(){
  if(ccPinMode==='create'){ ccPinFirst=ccPinBuf; ccPinBuf=''; ccPaintDots(); ccPinMode='confirm'; const s=document.getElementById('cc-sub'); if(s) s.textContent='Confirmez votre code'; return; }
  if(ccPinMode==='confirm'){
    if(ccPinBuf!==ccPinFirst){ ccPinMode='create'; ccPinFirst=''; const s=document.getElementById('cc-sub'); if(s) s.textContent='Codes différents. Recommencez.'; ccPinErr(''); return; }
    await ccCreate(ccPinBuf);
    // Propose Face ID after creation
    if(CC.bioSupported&&CC.store.secure) setTimeout(ccAskBio,400);
    else ccRenderHome();
    return;
  }
  const ok=await ccUnlockPin(ccPinBuf);
  if(ok) ccRenderHome(); else ccPinErr('Code incorrect');
}

function ccAskBio(){
  const overlay=document.createElement('div'); overlay.className='cc-modal'; overlay.id='cc-modal';
  overlay.innerHTML='<div class="cc-sheet">'
    +'<h3>Activer Face ID ?</h3>'
    +'<p style="color:var(--muted);font-size:14px;margin-bottom:14px;">Déverrouillez le coffre avec Face ID. Si non reconnu, votre code PIN reste utilisable.</p>'
    +'<div style="display:flex;gap:8px;">'
    +'<button class="btn btn-secondary btn-full" onclick="ccCloseModal();ccRenderHome()">Plus tard</button>'
    +'<button class="btn btn-primary btn-full" onclick="ccCloseModal();ccEnableBio().then(function(){ ccRenderHome(); })">Activer Face ID</button>'
    +'</div></div>';
  document.body.appendChild(overlay);
}

// ── Supabase init for coffre ──
async function ccInitSync(){
  // Pull encrypted store from Supabase
  const remote = await ccSbPull();
  if(!remote || !remote.store) return;

  const localStore = ccLoad();
  const localTs = (localStore && localStore._ts) ? localStore._ts : 0;
  const remoteTs = remote.ts || 0;

  if(remoteTs > localTs){
    // Remote is newer — overwrite local with remote encrypted store
    remote.store._ts = remoteTs;
    localStorage.setItem(CC_KEY, JSON.stringify(remote.store));
    CC.store = remote.store;
  }
}

// ── home ──
function ccRenderHome(){
  const root=document.getElementById('cc-root'); if(!root) return;
  const q=CC.search.trim().toLowerCase();
  let list=CC.data.residences.slice().sort(function(a,b){ return a.name.localeCompare(b.name,'fr'); });
  if(q) list=list.filter(function(r){ return r.name.toLowerCase().indexOf(q)>=0; });
  let rows='';
  if(!CC.data.residences.length){
    rows='<div class="empty-state" style="padding:32px 16px">Aucun client.<br>Ajoute ta première fiche.</div>';
  } else if(!list.length){
    rows='<div class="empty-state" style="padding:24px 16px">Aucun résultat.</div>';
  } else {
    for(let i=0;i<list.length;i++){
      const r=list[i];
      const bits=[];
      if(r.children.length) bits.push(r.children.length+(r.children.length>1?' sous-fiches':' sous-fiche'));
      if(r.sections.length) bits.push(r.sections.length+(r.sections.length>1?' équipements':' équipement'));
      rows+='<div class="cc-row" onclick="ccOpenNode(\''+r.id+'\')">'
        +'<div class="cc-ic">🏠</div>'

function ccOnSearch(v){ CC.search=v; ccRenderHome(); }
function ccGoHome(){ CC.route={name:'home',path:[],sectionId:null}; CC.search=''; ccRenderHome(); }
function ccOpenNode(id){ CC.route={name:'node',path:CC.route.path.concat(id),sectionId:null}; ccRenderNode(); }
function ccGoPath(p){ CC.route={name:'node',path:p,sectionId:null}; ccRenderNode(); }
function ccGoUp(){
  if(CC.route.name==='section'){ CC.route={name:'node',path:CC.route.path.slice(),sectionId:null}; ccRenderNode(); return; }
  const p=CC.route.path.slice(); p.pop();
  CC.route=p.length?{name:'node',path:p,sectionId:null}:{name:'home',path:[],sectionId:null};
  p.length?ccRenderNode():ccRenderHome();
}
function ccCrumbHtml(){
  if(!CC.route.path.length) return '';
  let html='<div class="cc-crumb"><b onclick="ccGoHome()">Clients</b>';
  let acc=[];
  for(let i=0;i<CC.route.path.length;i++){
    acc=acc.concat(CC.route.path[i]);
    const node=ccFind(acc); if(!node) break;
    const pCopy=acc.slice();
    html+='<span class="sep"> / </span><b onclick="ccGoPath('+JSON.stringify(pCopy)+')">'+ccEsc(node.name)+'</b>';
  }
  return html+'</div>';
}
function ccIconFor(name){ const n=(name||'').toLowerCase(); if(/vid|surv|cam/.test(n)) return '📷'; if(/interph|portail|porte/.test(n)) return '📞'; if(/alarm|intrus/.test(n)) return '🚨'; if(/access|badge|digicode|vigik/.test(n)) return '🔑'; if(/réseau|reseau|box|wifi/.test(n)) return '🌐'; return '⚙️'; }

// ── node ──
function ccRenderNode(){
  const root=document.getElementById('cc-root'); if(!root) return;
  const node=ccFind(CC.route.path); if(!node){ ccGoHome(); return; }
  let subRows='', secRows='';
  const children=node.children.slice().sort(function(a,b){ return a.name.localeCompare(b.name,'fr'); });
  for(let i=0;i<children.length;i++){
    const c=children[i];
    const bits=[];
    if(c.children.length) bits.push(c.children.length+' sous-fiche'+(c.children.length>1?'s':''));
    if(c.sections.length) bits.push(c.sections.length+' équipement'+(c.sections.length>1?'s':''));
    subRows+='<div class="cc-row" onclick="ccOpenNode(\''+c.id+'\')">'
      +'<div class="cc-ic">📁</div>'
      +'<div class="cc-tx"><div class="cc-nm">'+ccEsc(c.name)+'</div><div class="cc-sub">'+(bits.join(' · ')||'Vide')+'</div></div>'
      +'<div class="cc-chev">›</div></div>';
  }
  for(let i=0;i<node.sections.length;i++){
    const s=node.sections[i];
    secRows+='<div class="cc-row" onclick="ccOpenSection(\''+s.id+'\')">'
      +'<div class="cc-ic">'+ccIconFor(s.name)+'</div>'
      +'<div class="cc-tx"><div class="cc-nm">'+ccEsc(s.name)+'</div><div class="cc-sub">'+(s.fields.length?s.fields.length+' info'+(s.fields.length>1?'s':''):'Aucune info')+(s.notes?' · note':'')+'</div></div>'
      +'<div class="cc-chev">›</div></div>';
  }
  root.innerHTML='<div class="cc-topbar">'
    +'<button class="cc-back" onclick="ccGoUp()">‹</button>'
    +'<div class="cc-topbar-title">'+ccEsc(node.name)+'</div>'
    +'<button class="cc-gear" onclick="ccRenameNode()">✏️</button>'
    +'</div>'
    +ccCrumbHtml()
    +'<div class="cc-label">Sous-fiches</div>'
    +'<div class="cc-list">'+(subRows||'<div class="empty-state" style="padding:10px 16px;font-size:13px;">Aucune</div>')+'</div>'
    +'<button class="cc-add" onclick="ccAddChild()">＋ Sous-fiche / montée</button>'
    +'<div class="cc-label">Équipements</div>'
    +'<div class="cc-list">'+(secRows||'<div class="empty-state" style="padding:10px 16px;font-size:13px;">Aucun</div>')+'</div>'
    +'<button class="cc-add" onclick="ccAddSection()">＋ Ajouter un équipement</button>'
    +'<div style="margin:12px 16px;"><button class="btn btn-danger" style="font-size:13px;padding:9px 14px;width:auto;" onclick="ccDeleteNode()">Supprimer cette fiche</button></div>';
}

// ── section ──
function ccOpenSection(id){ CC.route={name:'section',path:CC.route.path.slice(),sectionId:id}; ccRenderSection(); }
function ccCurSection(){ const node=ccFind(CC.route.path); return node&&node.sections.find(function(s){ return s.id===CC.route.sectionId; }); }
function ccRenderSection(){

    +'<button class="btn btn-secondary" style="font-size:12px;padding:7px 12px;margin-top:10px;" onclick="ccEditNotes()">'+(sec.notes?'Modifier':'Ajouter une note')+'</button>'

function ccFieldHtml(f){

    return '<div class="cc-field"><div class="cc-field-lbl">'+ccEsc(f.label)+'</div>'
      +'<div class="cc-field-val"><span class="cc-field-v schema-lnk" onclick="ccShowSchemaModal(\''+f.id+'\')">'+ccEsc(f.value||'—')+'</span>'
      +'<button class="cc-mini" onclick="ccCopyFieldById(\''+f.id+'\')">📋</button>'
      +'<button class="cc-mini" onclick="ccEditField(\''+f.id+'\')">✏️</button></div></div>';
  }
  return '<div class="cc-field"><div class="cc-field-lbl">'+ccEsc(f.label)+'</div>'
    +'<div class="cc-field-val"><span class="cc-field-v mask" id="ccv_'+f.id+'" data-real="'+ccSafeAttr(f.value)+'">'+ccMask(f.value)+'</span>'
    +'<button class="cc-mini" onclick="ccToggleReveal(\''+f.id+'\')">👁</button>'
    +'<button class="cc-mini" onclick="ccCopyFieldById(\''+f.id+'\')">📋</button>'

}
function ccMask(v){ return v?'•'.repeat(Math.min(String(v).length,10)):'—'; }
function ccToggleReveal(id){ const el=document.getElementById('ccv_'+id); if(!el)return; if(el.classList.contains('mask')){ el.textContent=el.dataset.real; el.classList.remove('mask'); } else { el.textContent=ccMask(el.dataset.real); el.classList.add('mask'); } }
function ccCopyFieldById(id){ const sec=ccCurSection(); const f=sec&&sec.fields.find(function(x){ return x.id===id; }); if(f) navigator.clipboard.writeText(f.value).then(function(){ showToast('Copié !'); }); }

function ccEditField(id){ const sec=ccCurSection(); ccFieldDialog(sec&&sec.fields.find(function(f){ return f.id===id; })); }

    +'<div id="cc-fdSW"'+(ccFdType!=='schema'?' style="display:none"':'')+'>'

function ccFdSetType(t){ ccFdType=t; const st=document.getElementById('cc-segT'),ss=document.getElementById('cc-segS'); if(st)st.classList.toggle('on',t==='text'); if(ss)ss.classList.toggle('on',t==='schema'); const vw=document.getElementById('cc-fdVW'),sw=document.getElementById('cc-fdSW'); if(vw)vw.style.display=t==='schema'?'none':''; if(sw)sw.style.display=t!=='schema'?'none':''; }
function ccSchemaReset(){ ccSchemaSeq=[]; ccRenderSchemaEditor(); }
function ccSchemaTap(n){ if(ccSchemaSeq.indexOf(n)>=0) return; ccSchemaSeq.push(n); ccRenderSchemaEditor(); }
function ccRenderSchemaEditor(){ const w=document.getElementById('cc-schEd'); if(!w)return; w.innerHTML=ccSchemaSVG(ccSchemaSeq,true); const h=document.getElementById('cc-schHint'); if(h) h.textContent=ccSchemaSeq.length?'Code : '+ccSchemaSeq.join('-'):'Touchez les points dans l\'ordre'; }
function ccFdSave(id){
  const label=document.getElementById('cc-fdLabel').value.trim(); if(!label){ showToast('Donnez un intitulé'); return; }
  let value; if(ccFdType==='schema'){ value=ccSchemaSeq.join('-'); if(!value){ showToast('Tracez le schéma'); return; } } else { value=document.getElementById('cc-fdVal').value; }
  const sec=ccCurSection();
  if(id){ const f=sec.fields.find(function(x){ return x.id===id; }); if(f){ f.label=label; f.type=ccFdType; f.value=value; } }
  else { sec.fields.push({id:ccUid(),label:label,type:ccFdType,value:value}); }
  ccSaveData().then(function(){ ccCloseModal(); ccRenderSection(); });
}
function ccFdDelete(id){ const sec=ccCurSection(); const i=sec.fields.findIndex(function(f){ return f.id===id; }); if(i>=0)sec.fields.splice(i,1); ccSaveData().then(function(){ ccCloseModal(); ccRenderSection(); }); }

// ── schema SVG ──
function ccDotPos(i){ const col=(i-1)%3, row=Math.floor((i-1)/3); return {x:40+col*70,y:40+row*70}; }
function ccSchemaSVG(seq,interactive){
  seq=(seq||[]).map(Number).filter(function(n){ return n>=1&&n<=9; });
  let pts=''; for(let i=0;i<seq.length;i++){ const p=ccDotPos(seq[i]); pts+=p.x+','+p.y+' '; }
  const line=seq.length>1?'<polyline points="'+pts.trim()+'" fill="none" stroke="#f5a623" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>':'';
  let dots='';
  for(let i=1;i<=9;i++){
    const p=ccDotPos(i); const order=seq.indexOf(i); const used=order>=0;
    const fill=used?'#f5a623':'#222'; const stroke=used?'#f5a623':'#2a2a2a'; const tc=used?'#000':'#888';
    const tap=interactive?' style="cursor:pointer" onclick="ccSchemaTap('+i+')"':'';
    dots+='<g'+tap+'><circle cx="'+p.x+'" cy="'+p.y+'" r="22" fill="'+fill+'" stroke="'+stroke+'" stroke-width="2"/>'
      +'<text x="'+p.x+'" y="'+(p.y+5)+'" text-anchor="middle" font-size="14" font-weight="700" fill="'+tc+'" font-family="-apple-system,sans-serif">'+(used?(order+1):i)+'</text></g>';
  }
  return '<svg viewBox="0 0 220 220" width="100%" style="max-width:220px" xmlns="http://www.w3.org/2000/svg">'+line+dots+'</svg>';
}
function ccShowSchemaModal(id){ const sec=ccCurSection(); const f=sec&&sec.fields.find(function(x){ return x.id===id; }); if(!f) return; const seq=f.value?f.value.split('-').filter(Boolean):[]; const overlay=document.createElement('div'); overlay.className='cc-modal'; overlay.id='cc-modal'; overlay.innerHTML='<div class="cc-sheet"><h3>'+ccEsc(f.label)+'</h3><div class="cc-schwrap">'+ccSchemaSVG(seq,false)+'<div class="cc-schhint">Ordre : <strong style="color:var(--accent)">'+ccEsc(f.value||'—')+'</strong></div></div><button class="btn btn-primary btn-full" style="margin-top:14px;" onclick="ccCloseModal()">Fermer</button></div>'; document.body.appendChild(overlay); }

function ccDeleteSection(){ const node=ccFind(CC.route.path); ccConfirmDlg('Supprimer cet équipement ?',function(){ const i=node.sections.findIndex(function(s){ return s.id===CC.route.sectionId; }); if(i>=0)node.sections.splice(i,1); ccSaveData().then(function(){ ccGoUp(); }); }); }

    +'<div class="cc-row" onclick="ccExportBackup()"><div class="cc-ic">⬇️</div><div class="cc-tx"><div class="cc-nm">Exporter une sauvegarde</div><div class="cc-sub">Fichier JSON chiffré</div></div><div class="cc-chev">›</div></div>'

function ccExportBackup(){ const blob=new Blob([JSON.stringify(CC.store,null,2)],{type:'application/json'}); const url=URL.createObjectURL(blob); const a=document.createElement('a'); const d=new Date(); const stamp=d.getFullYear()+('0'+(d.getMonth()+1)).slice(-2)+('0'+d.getDate()).slice(-2); a.href=url; a.download='coffre-codes-'+stamp+'.json'; document.body.appendChild(a); a.click(); a.remove(); setTimeout(function(){ URL.revokeObjectURL(url); },1500); showToast('Sauvegarde exportée'); }
function ccResetAll(){ ccConfirmDlg('Effacer définitivement tous les codes ?',function(){ localStorage.removeItem(CC_KEY); ccIdbDel('ccBioKey'); CC.store=null; CC.data=null; CC.dek=null; CC.dekRaw=null; CC.fbSeed=null; CC.unlocked=false; ccCloseModal(); ccRenderLock(); }); }
function ccChangePinDialog(){ ccCloseModal(); ccPromptPin('Nouveau code PIN',function(p1){ ccPromptPin('Confirmez le code',function(p2){ if(p1!==p2){ showToast('Codes différents'); return; } ccChangePin(p2).then(function(){ showToast('Code modifié'); }); }); }); }
async function ccChangePin(newPin){ if(CC.store.secure){ const salt=crypto.getRandomValues(new Uint8Array(16)); const pinKey=await ccPinKey(newPin,salt); CC.store.salt=ccB64(salt); CC.store.pinWrappedDek=await ccAesEnc(pinKey,CC.dekRaw); } else { const saltB=ccB64(crypto.getRandomValues(new Uint8Array(16))); const seed=saltB+'|'+newPin; const json=ccEnc.encode(JSON.stringify(CC.data)); CC.store.salt=saltB; CC.store.pinCheck=cyrb53cc('chk|'+seed); CC.store.vault={fb:ccB64(fbXorCC(json,seed))}; CC.fbSeed=seed; } ccPersist(); await ccSbPush(); }

function ccCloseModal(){ const m=document.getElementById('cc-modal'); if(m) m.remove(); }
function ccPromptText(title,placeholder,value,onok,presets){ const overlay=document.createElement('div'); overlay.className='cc-modal'; overlay.id='cc-modal'; let ch=''; if(presets){ for(let i=0;i<presets.length;i++) ch+='<button class="cc-chip" onclick="document.getElementById(\'cc-ptIn\').value=\''+presets[i]+'\'">'+presets[i]+'</button>'; } overlay.innerHTML='<div class="cc-sheet"><h3>'+ccEsc(title)+'</h3><input type="text" id="cc-ptIn" placeholder="'+ccEsc(placeholder)+'" value="'+ccEsc(value)+'">'+(ch?'<div class="cc-chips">'+ch+'</div>':'')+'<div style="display:flex;gap:8px;margin-top:12px;"><button class="btn btn-secondary btn-full" onclick="ccCloseModal()">Annuler</button><button class="btn btn-primary btn-full" id="cc-ptOk">Valider</button></div></div>'; document.body.appendChild(overlay); setTimeout(function(){ const i=document.getElementById('cc-ptIn'); if(i) i.focus(); },80); document.getElementById('cc-ptOk').onclick=function(){ const v=document.getElementById('cc-ptIn').value; ccCloseModal(); onok(v); }; }
function ccPromptTextarea(title,placeholder,value,onok){ const overlay=document.createElement('div'); overlay.className='cc-modal'; overlay.id='cc-modal'; overlay.innerHTML='<div class="cc-sheet"><h3>'+ccEsc(title)+'</h3><textarea id="cc-ptArea" placeholder="'+ccEsc(placeholder)+'">'+ccEsc(value)+'</textarea><div style="display:flex;gap:8px;margin-top:12px;"><button class="btn btn-secondary btn-full" onclick="ccCloseModal()">Annuler</button><button class="btn btn-primary btn-full" id="cc-ptOk">Enregistrer</button></div></div>'; document.body.appendChild(overlay); setTimeout(function(){ const a=document.getElementById('cc-ptArea'); if(a) a.focus(); },80); document.getElementById('cc-ptOk').onclick=function(){ const v=document.getElementById('cc-ptArea').value; ccCloseModal(); onok(v); }; }
function ccConfirmDlg(msg,onok){ const overlay=document.createElement('div'); overlay.className='cc-modal'; overlay.id='cc-modal'; overlay.innerHTML='<div class="cc-sheet"><h3>Confirmation</h3><p style="color:var(--muted);font-size:14px;">'+ccEsc(msg)+'</p><div style="display:flex;gap:8px;margin-top:12px;"><button class="btn btn-secondary btn-full" onclick="ccCloseModal()">Annuler</button><button class="btn btn-danger btn-full" id="cc-cfOk">Supprimer</button></div></div>'; document.body.appendChild(overlay); document.getElementById('cc-cfOk').onclick=function(){ ccCloseModal(); onok(); }; }
function ccPromptPin(title,onok){ let buf=''; const overlay=document.createElement('div'); overlay.className='cc-modal'; overlay.id='cc-modal'; overlay.innerHTML='<div class="cc-sheet" style="text-align:center"><h3>'+ccEsc(title)+'</h3><div class="cc-dots" id="cc-ppDots" style="justify-content:center;margin:6px auto 16px;"><div class="cd"></div><div class="cd"></div><div class="cd"></div><div class="cd"></div></div><div class="cc-pad" style="margin:0 auto;"><button class="cc-key" data-n="1">1</button><button class="cc-key" data-n="2">2</button><button class="cc-key" data-n="3">3</button><button class="cc-key" data-n="4">4</button><button class="cc-key" data-n="5">5</button><button class="cc-key" data-n="6">6</button><button class="cc-key" data-n="7">7</button><button class="cc-key" data-n="8">8</button><button class="cc-key" data-n="9">9</button><button class="cc-key blank"></button><button class="cc-key" data-n="0">0</button><button class="cc-key fn" id="cc-ppDel">⌫</button></div><div style="margin-top:12px;"><button class="btn btn-secondary" style="width:auto;padding:9px 18px;" onclick="ccCloseModal()">Annuler</button></div></div>'; document.body.appendChild(overlay); function paint(){ const ds=document.getElementById('cc-ppDots'); if(!ds)return; const k=[...ds.children]; for(let i=0;i<4;i++) k[i]&&k[i].classList.toggle('f',i<buf.length); } overlay.querySelectorAll('.cc-key[data-n]').forEach(function(k){ k.onclick=function(){ if(buf.length>=4)return; buf+=k.dataset.n; paint(); if(buf.length===4){ const v=buf; setTimeout(function(){ ccCloseModal(); onok(v); },120); } }; }); document.getElementById('cc-ppDel').onclick=function(){ buf=buf.slice(0,-1); paint(); }; }

// ── Agenda Google Calendar tab ──
function ccRenderAgenda(){
  const root=document.getElementById('cc-root'); if(!root) return;
  root.innerHTML='<div class="cc-topbar"><div class="cc-topbar-title">📅 Agenda</div><button class="cc-gear" onclick="loadAgenda()">🔄</button></div>'
    +'<div id="cc-agenda-content" style="padding:16px;"><div class="empty-state">Chargement…</div></div>';
  loadAgenda();
}

// ── hook into switchTab ──
(function(){
  var orig=switchTab;
  switchTab=function(t){
    orig(t);
    if(t==='coffre'){
      CC.store=ccLoad();
      ccCheckBioSupport().then(function(){
        if(!CC.store||!CC.unlocked){
          ccInitSync().then(function(){
            CC.store=ccLoad();
            ccRenderLock();
          });
        } else {
          if(CC.route.name==='home') ccRenderHome();
          else if(CC.route.name==='node') ccRenderNode();
          else if(CC.route.name==='section') ccRenderSection();
        }
      });
    }
  };
})();

// ── add biobtn CSS ──
(function(){
  const s=document.createElement('style');
  s.textContent='.cc-biobtn{background:none;border:none;color:var(--accent);font-weight:600;font-size:15px;margin-top:14px;cursor:pointer;display:flex;align-items:center;gap:8px;font-family:"DM Sans",sans-serif;}';
  document.head.appendChild(s);
})();

</script>
