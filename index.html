<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Harmonie Élec">
<title>Harmonie Électricité</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap');

  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #222;
    --border: #2a2a2a;
    --accent: #f5a623;
    --accent2: #e8420a;
    --green: #22c55e;
    --red: #ef4444;
    --text: #f0f0f0;
    --muted: #888;
    --radius: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    min-height: -webkit-fill-available;
    max-width: 480px;
    margin: 0 auto;
    overflow-x: hidden;
  }

  /* TOP BAR */
  .topbar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(15,15,15,0.95);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    padding: 14px 18px 10px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .topbar-logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 17px;
    color: var(--accent);
    letter-spacing: -0.3px;
  }
  .topbar-logo span { color: var(--text); }
  .sync-indicator {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }
  .sync-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--red);
    transition: background 0.4s;
  }
  .sync-dot.green { background: var(--green); }
  .sync-dot.syncing { background: var(--accent); animation: pulse 0.8s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* NAV */
  nav {
    position: fixed;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 100%; max-width: 480px;
    background: rgba(20,20,20,0.97);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-top: 1px solid var(--border);
    display: flex;
    padding: 8px 0 max(8px, env(safe-area-inset-bottom));
    z-index: 100;
  }
  .nav-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    cursor: pointer;
    padding: 4px 0;
    transition: color 0.2s;
  }
  .nav-btn.active { color: var(--accent); }
  .nav-btn svg { width: 22px; height: 22px; }
  .nav-badge {
    position: absolute;
    top: -4px; right: -4px;
    width: 16px; height: 16px;
    background: var(--accent2);
    border-radius: 50%;
    font-size: 9px;
    display: flex; align-items: center; justify-content: center;
    color: white; font-weight: 700;
  }
  .nav-icon-wrap { position: relative; }

  /* CONTENT */
  .content {
    padding: 16px 16px 100px;
  }
  .tab { display: none; }
  .tab.active { display: block; }

  /* CARDS */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
  }
  .card-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 13px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 12px;
  }

  /* BUTTONS */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 11px 18px;
    border-radius: 10px;
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn:active { transform: scale(0.96); }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-danger { background: var(--red); color: white; }
  .btn-green { background: var(--green); color: #000; }
  .btn-full { width: 100%; justify-content: center; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* === DICTAPHONE === */
  #mic-section {
    text-align: center;
    padding: 8px 0 16px;
  }
  .mic-btn {
    width: 88px; height: 88px;
    border-radius: 50%;
    border: 3px solid var(--accent);
    background: var(--surface2);
    color: var(--accent);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    margin: 0 auto;
    box-shadow: 0 0 0 0 rgba(245,166,35,0.4);
  }
  .mic-btn.recording {
    background: var(--accent2);
    border-color: var(--accent2);
    color: white;
    animation: micpulse 1.2s infinite;
  }
  @keyframes micpulse {
    0% { box-shadow: 0 0 0 0 rgba(232,66,10,0.5); }
    70% { box-shadow: 0 0 0 18px rgba(232,66,10,0); }
    100% { box-shadow: 0 0 0 0 rgba(232,66,10,0); }
  }
  .mic-btn svg { width: 36px; height: 36px; }
  .mic-status {
    margin-top: 10px;
    font-size: 13px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }
  .transcript-area {
    width: 100%;
    min-height: 80px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    padding: 12px;
    resize: none;
    margin: 12px 0 10px;
    outline: none;
    line-height: 1.5;
  }
  .transcript-area:focus { border-color: var(--accent); }
  .tag-row {
    display: flex;
    gap: 7px;
    flex-wrap: wrap;
    margin-bottom: 12px;
  }
  .tag-btn {
    padding: 6px 13px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'DM Sans', sans-serif;
  }
  .tag-btn.selected {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(245,166,35,0.1);
  }

  /* NOTES LIST */
  .note-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 8px;
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }
  .note-tag {
    font-size: 10px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 6px;
    flex-shrink: 0;
    margin-top: 1px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.5px;
  }
  .tag-devis { background: rgba(245,166,35,0.2); color: var(--accent); }
  .tag-client { background: rgba(34,197,94,0.2); color: var(--green); }
  .tag-chantier { background: rgba(99,102,241,0.2); color: #818cf8; }
  .tag-materiel { background: rgba(232,66,10,0.2); color: #f87171; }
  .tag-idee { background: rgba(139,92,246,0.2); color: #c084fc; }
  .note-body { flex: 1; }
  .note-text { font-size: 14px; line-height: 1.45; }
  .note-time { font-size: 11px; color: var(--muted); margin-top: 4px; font-family: 'DM Mono', monospace; }
  .note-actions { display: flex; gap: 6px; margin-top: 8px; }
  .note-del { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 18px; padding: 0 4px; }
  .note-del:hover { color: var(--red); }
  .empty-state { text-align: center; color: var(--muted); padding: 32px 16px; font-size: 14px; }

  /* === CHECKLIST === */
  .checklist-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .progress-bar-wrap { background: var(--surface2); border-radius: 6px; height: 6px; flex: 1; margin: 0 12px; }
  .progress-bar-fill { background: var(--accent); height: 6px; border-radius: 6px; transition: width 0.4s; }
  .progress-label { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); }

  .check-item {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 10px;
    transition: all 0.2s;
  }
  .check-item.locked { opacity: 0.4; }
  .check-item.done { border-color: var(--green); opacity: 0.7; }
  .check-item.skipped { border-color: var(--muted); opacity: 0.5; }
  .check-item-top { display: flex; align-items: center; gap: 10px; }
  .check-number {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--surface);
    border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    flex-shrink: 0;
    color: var(--muted);
  }
  .check-item.active .check-number { border-color: var(--accent); color: var(--accent); }
  .check-item.done .check-number { background: var(--green); border-color: var(--green); color: #000; }
  .check-label { font-size: 14px; font-weight: 600; flex: 1; }
  .check-detail { font-size: 12px; color: var(--muted); margin: 6px 0 10px 38px; }
  .check-btns { display: flex; gap: 7px; margin-top: 10px; margin-left: 38px; }

  /* === CLIENTS === */
  .urgency-badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 6px;
    font-family: 'DM Mono', monospace;
  }
  .urgency-high { background: rgba(239,68,68,0.2); color: #f87171; }
  .urgency-medium { background: rgba(245,166,35,0.2); color: var(--accent); }
  .urgency-low { background: rgba(34,197,94,0.2); color: var(--green); }

  .client-item {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 10px;
  }
  .client-item.done { opacity: 0.5; }
  .client-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
  .client-name { font-weight: 700; font-size: 15px; }
  .client-type { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
  .client-note { font-size: 13px; line-height: 1.4; margin-bottom: 10px; background: var(--surface); padding: 8px 10px; border-radius: 8px; }
  .client-btns { display: flex; gap: 7px; flex-wrap: wrap; }

  /* AI RESPONSE */
  .ai-response {
    background: var(--surface);
    border: 1px solid rgba(245,166,35,0.3);
    border-radius: 10px;
    padding: 14px;
    margin-top: 10px;
    font-size: 14px;
    line-height: 1.6;
    white-space: pre-wrap;
    display: none;
  }
  .ai-response.visible { display: block; }
  .ai-loading { color: var(--accent); font-family: 'DM Mono', monospace; font-size: 12px; }

  /* AGENDA */
  .agenda-event {
    display: flex;
    gap: 12px;
    padding: 12px 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 8px;
    align-items: flex-start;
  }
  .event-time {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    min-width: 50px;
    margin-top: 1px;
  }
  .event-body { flex: 1; }
  .event-title { font-size: 14px; font-weight: 600; }
  .event-location { font-size: 12px; color: var(--muted); margin-top: 2px; }

  /* IA PANEL */
  .ia-shortcuts {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 16px;
  }
  .shortcut-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 13px 12px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    text-align: left;
    transition: all 0.15s;
  }
  .shortcut-btn:active { transform: scale(0.97); background: var(--surface); }
  .shortcut-icon { font-size: 20px; display: block; margin-bottom: 6px; }

  .ia-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 12px;
    resize: none;
    outline: none;
    min-height: 80px;
    line-height: 1.5;
  }
  .ia-input:focus { border-color: var(--accent); }

  /* MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    z-index: 200;
    display: none;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px 20px 0 0;
    padding: 20px 18px max(20px, env(safe-area-inset-bottom));
    width: 100%; max-width: 480px;
    max-height: 85vh;
    overflow-y: auto;
  }
  .modal-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 18px;
    margin-bottom: 16px;
  }
  .modal-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 11px 13px;
    outline: none;
    margin-bottom: 10px;
  }
  .modal-input:focus { border-color: var(--accent); }
  select.modal-input option { background: var(--surface2); }

  /* SECTION HEADER */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .section-title {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 20px;
  }

  /* DIVIDER */
  .divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

  /* COPY BTN */
  .copy-btn {
    margin-top: 8px;
    font-size: 12px;
    padding: 6px 12px;
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--green);
    color: #000;
    font-weight: 700;
    font-size: 13px;
    padding: 10px 20px;
    border-radius: 24px;
    z-index: 300;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }


  /* === AGENDA 5 JOURS === */
  .gcal-day-header {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 6px 4px; text-align: center; cursor: pointer;
  }
  .gcal-day-header.today { border-color: var(--accent); background: rgba(245,166,35,0.1); }
  .gcal-day-name { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .gcal-day-num { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 18px; }
  .gcal-day-header.today .gcal-day-num { color: var(--accent); }
  .gcal-day-header .gcal-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); margin: 2px auto 0; }

  .gcal-event {
    background: var(--surface2); border: 1px solid var(--border);
    border-left: 3px solid var(--accent); border-radius: 8px;
    padding: 10px 12px; margin-bottom: 6px; cursor: pointer;
    transition: background 0.15s;
  }
  .gcal-event:active { background: var(--surface); }
  .gcal-event.past { opacity: 0.5; border-left-color: var(--muted); }
  .gcal-event-time { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--accent); margin-bottom: 2px; }
  .gcal-event-title { font-weight: 600; font-size: 14px; }
  .gcal-event-loc { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .gcal-day-label { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 13px; color: var(--text); margin: 14px 0 6px; padding-bottom: 4px; border-bottom: 1px solid var(--border); }
  .gcal-day-label.today-label { color: var(--accent); }
  .gcal-empty-day { font-size: 12px; color: var(--muted); padding: 4px 0 8px; font-style: italic; }

  /* Event modal */
  .gcal-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 400; display: flex; align-items: flex-end; justify-content: center; }
  .gcal-sheet { background: var(--surface); border-radius: 20px 20px 0 0; padding: 20px 18px max(20px,env(safe-area-inset-bottom)); width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; }
  .gcal-sheet h3 { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 18px; margin-bottom: 14px; }
  .gcal-sheet label { display: block; font-size: 12px; color: var(--muted); font-weight: 700; margin: 10px 0 4px; text-transform: uppercase; }
  .gcal-sheet input, .gcal-sheet textarea { width: 100%; padding: 11px 13px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; }
  .gcal-sheet input:focus, .gcal-sheet textarea:focus { border-color: var(--accent); }

  /* === DEVIS & BONS === */
  .devis-item { background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px; }
  .devis-header { display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px; }
  .devis-num { font-family:'DM Mono',monospace;font-size:11px;color:var(--muted); }
  .devis-client { font-weight:700;font-size:15px; }
  .devis-date { font-size:12px;color:var(--muted);margin-bottom:8px; }
  .devis-total { font-size:18px;font-weight:800;color:var(--accent); }
  .devis-status { font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px; }
  .status-brouillon { background:rgba(136,136,136,0.15);color:var(--muted); }
  .status-envoye { background:rgba(96,165,250,0.15);color:#60a5fa; }
  .status-accepte { background:rgba(34,197,94,0.15);color:var(--green); }
  .status-refuse { background:rgba(239,68,68,0.15);color:var(--red); }
  .status-facture { background:rgba(245,166,35,0.15);color:var(--accent); }

  /* Catalogue search */
  .cat-search { position:relative;margin-bottom:8px; }
  .cat-search input { width:100%;padding:10px 12px 10px 36px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;outline:none; }
  .cat-search input:focus { border-color:var(--accent); }
  .cat-search .si { position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted); }
  .cat-result { background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:4px;cursor:pointer;display:flex;justify-content:space-between;align-items:center; }
  .cat-result:active { background:var(--surface); }
  .cat-ref { font-family:'DM Mono',monospace;font-size:10px;color:var(--muted); }
  .cat-nom { font-size:13px;font-weight:500;flex:1;margin:0 8px; }
  .cat-pv { font-size:13px;font-weight:700;color:var(--accent);white-space:nowrap; }

  /* Ligne devis */
  .devis-ligne { display:flex;gap:8px;align-items:center;padding:8px 0;border-bottom:1px solid var(--border); }
  .devis-ligne:last-child { border-bottom:none; }
  .dl-nom { flex:1;font-size:13px; }
  .dl-qty { width:50px;padding:6px 8px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:13px;text-align:center;outline:none; }
  .dl-pu { width:70px;padding:6px 8px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:13px;text-align:right;outline:none; }
  .dl-total { width:70px;text-align:right;font-size:13px;font-weight:700;color:var(--accent); }
  .dl-del { color:var(--muted);font-size:18px;cursor:pointer;background:none;border:none;padding:0 2px; }
  .dl-del:hover { color:var(--red); }

  /* Devis modal */
  .devis-modal { position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:300;display:flex;align-items:flex-end;justify-content:center; }
  .devis-sheet { background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-width:480px;max-height:95vh;overflow-y:auto;padding:20px 16px max(20px,env(safe-area-inset-bottom)); }

  /* === DOCS FILTER === */

  .client-fiche-sheet { background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-width:480px;max-height:92vh;overflow-y:auto;padding:20px 16px max(20px,env(safe-area-inset-bottom)); }

  #tab-coffre { padding: 0; }
  .cc-lock { display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; gap:6px; padding:32px 24px; min-height:60vh; }
  .cc-logo { width:72px; height:72px; border-radius:20px; background:var(--accent); color:#000; display:flex; align-items:center; justify-content:center; font-size:34px; margin-bottom:10px; box-shadow:0 6px 24px rgba(245,166,35,0.3); }
  .cc-lock h2 { font-family:'Syne',sans-serif; font-size:20px; font-weight:800; margin:4px 0 0; }
  .cc-lock p { color:var(--muted); margin:4px 0 16px; font-size:14px; max-width:280px; }
  .cc-dots { display:flex; gap:14px; margin:6px 0 16px; }

  .cc-dots .cd.f { background:var(--accent); }
  .cc-dots.err .cd { border-color:var(--red); background:var(--red); }
  .cc-shake { animation:ccshake .4s; }
  @keyframes ccshake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-8px)} 40%,80%{transform:translateX(8px)} }
  .cc-pad { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; width:100%; max-width:280px; }
  .cc-key { height:62px; border-radius:50%; border:1px solid var(--border); background:var(--surface); color:var(--text); font-size:24px; font-weight:500; cursor:pointer; }
  .cc-key:active { background:var(--surface2); }
  .cc-key.blank { border:none; background:none; }
  .cc-key.fn { font-size:14px; font-weight:700; color:var(--accent); }
  .cc-lockmsg { color:var(--red); min-height:18px; font-size:13px; margin-top:4px; font-family:'DM Mono',monospace; }
  .cc-topbar { display:flex; align-items:center; gap:10px; padding:12px 16px 8px; position:sticky; top:56px; background:rgba(15,15,15,0.95); backdrop-filter:blur(12px); z-index:50; border-bottom:1px solid var(--border); }
  .cc-topbar-title { font-family:'Syne',sans-serif; font-weight:800; font-size:17px; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .cc-back, .cc-gear { background:var(--surface2); border:1px solid var(--border); border-radius:10px; color:var(--text); width:34px; height:34px; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:16px; flex-shrink:0; }
  .cc-search { position:relative; margin:10px 16px 4px; }
  .cc-search input { width:100%; padding:11px 12px 11px 38px; border-radius:10px; border:1px solid var(--border); background:var(--surface); color:var(--text); font-size:14px; font-family:'DM Sans',sans-serif; outline:none; }
  .cc-search input:focus { border-color:var(--accent); }
  .cc-search .si { position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--muted); }
  .cc-label { font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin:14px 16px 6px; }
  .cc-list { margin:0 16px; }
  .cc-row { display:flex; align-items:center; gap:12px; padding:13px 14px; width:100%; text-align:left; background:var(--surface2); border:1px solid var(--border); border-radius:10px; margin-bottom:6px; cursor:pointer; color:var(--text); }
  .cc-row:active { background:var(--surface); }
  .cc-ic { width:36px; height:36px; border-radius:10px; background:rgba(245,166,35,0.15); color:var(--accent); display:flex; align-items:center; justify-content:center; font-size:17px; flex-shrink:0; }
  .cc-tx { flex:1; min-width:0; }
  .cc-nm { font-weight:600; font-size:14px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .cc-sub { font-size:12px; color:var(--muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; margin-top:1px; }
  .cc-chev { color:var(--muted); font-size:18px; flex-shrink:0; }
  .cc-add { display:flex; align-items:center; gap:10px; width:calc(100% - 32px); margin:6px 16px; padding:12px 14px; border-radius:10px; border:1.5px dashed var(--border); background:transparent; color:var(--accent); font-weight:600; font-size:14px; cursor:pointer; font-family:'DM Sans',sans-serif; }
  .cc-add:active { background:var(--surface2); }
  .cc-field { padding:12px 14px; border-bottom:1px solid var(--border); }
  .cc-field:last-child { border-bottom:none; }
  .cc-field-lbl { font-size:11px; color:var(--muted); font-weight:700; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:4px; }
  .cc-field-val { display:flex; align-items:center; gap:8px; }
  .cc-field-v { flex:1; font-size:16px; word-break:break-word; font-variant-numeric:tabular-nums; }
  .cc-field-v.mask { letter-spacing:3px; color:var(--muted); }
  .cc-field-v.schema-lnk { color:var(--accent); font-weight:600; cursor:pointer; text-decoration:underline; }
  .cc-mini { width:32px; height:32px; border-radius:8px; border:1px solid var(--border); background:var(--surface2); color:var(--muted); display:flex; align-items:center; justify-content:center; font-size:14px; cursor:pointer; flex-shrink:0; }
  .cc-mini:active { background:var(--border); }
  .cc-notes { white-space:pre-wrap; word-break:break-word; font-size:14px; line-height:1.5; }
  .cc-crumb { display:flex; flex-wrap:wrap; gap:4px; align-items:center; font-size:12px; color:var(--muted); padding:6px 16px 2px; }
  .cc-crumb b { color:var(--accent); font-weight:600; cursor:pointer; }
  .cc-modal { position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:500; display:flex; align-items:flex-end; justify-content:center; }
  .cc-sheet { background:var(--surface); border-radius:20px 20px 0 0; padding:20px 18px max(20px,env(safe-area-inset-bottom)); width:100%; max-width:480px; max-height:88vh; overflow-y:auto; }
  .cc-sheet h3 { font-family:'Syne',sans-serif; font-weight:800; font-size:18px; margin-bottom:14px; }
  .cc-sheet label { display:block; font-size:12px; color:var(--muted); font-weight:700; margin:10px 0 4px; text-transform:uppercase; letter-spacing:0.5px; }
  .cc-sheet input[type=text], .cc-sheet textarea, .cc-sheet select { width:100%; padding:11px 13px; border-radius:10px; border:1px solid var(--border); background:var(--surface2); color:var(--text); font-family:'DM Sans',sans-serif; font-size:14px; outline:none; }
  .cc-sheet input:focus, .cc-sheet textarea:focus { border-color:var(--accent); }
  .cc-sheet textarea { min-height:80px; resize:none; }
  .cc-chips { display:flex; flex-wrap:wrap; gap:7px; margin-top:6px; }
  .cc-chip { padding:6px 11px; border-radius:16px; border:1px solid var(--border); background:var(--surface2); color:var(--text); font-size:13px; cursor:pointer; font-family:'DM Sans',sans-serif; }
  .cc-chip:active { border-color:var(--accent); color:var(--accent); }
  .cc-seg { display:flex; gap:8px; margin-top:6px; }
  .cc-seg button { flex:1; padding:10px; border-radius:10px; border:1px solid var(--border); background:var(--surface2); color:var(--text); font-weight:500; font-family:'DM Sans',sans-serif; cursor:pointer; }
  .cc-seg button.on { background:rgba(245,166,35,0.15); border-color:var(--accent); color:var(--accent); font-weight:700; }
  .cc-danger-lnk { color:var(--red); background:none; border:none; font-weight:600; padding:8px; width:100%; cursor:pointer; font-family:'DM Sans',sans-serif; font-size:14px; }
  .cc-small { font-size:12px; color:var(--muted); margin-top:8px; line-height:1.5; }
  .cc-schwrap { display:flex; flex-direction:column; align-items:center; gap:10px; }
  .cc-schhint { color:var(--muted); font-size:13px; text-align:center; font-family:'DM Mono',monospace; }

<body>

<div class="topbar">
  <div class="topbar-logo">⚡ Harmonie<span> Élec</span></div>
  <div class="sync-indicator">
    <div class="sync-dot" id="syncDot"></div>
    <span id="syncLabel">Local</span>
  </div>
</div>

<div class="content">

  <!-- TAB: DICTAPHONE -->
  <div class="tab active" id="tab-dict">
    <div class="section-header">
      <div class="section-title">Dictaphone</div>
    </div>
    <div class="card">
      <div id="mic-section">
        <button class="mic-btn" id="micBtn" onclick="toggleMic()">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-7a3 3 0 01-3-3V5a3 3 0 016 0v6a3 3 0 01-3 3z"/></svg>
        </button>
        <div class="mic-status" id="micStatus">Appuyer pour dicter</div>
      </div>
      <textarea class="transcript-area" id="transcriptArea" placeholder="La transcription apparaît ici... ou tape directement"></textarea>
      <div class="tag-row" id="tagRow">
        <button class="tag-btn selected" data-tag="devis" onclick="selectTag(this)">Devis</button>
        <button class="tag-btn" data-tag="client" onclick="selectTag(this)">Client</button>
        <button class="tag-btn" data-tag="chantier" onclick="selectTag(this)">Chantier</button>
        <button class="tag-btn" data-tag="materiel" onclick="selectTag(this)">Matériel</button>
        <button class="tag-btn" data-tag="idee" onclick="selectTag(this)">Idée</button>
      </div>
      <button class="btn btn-primary btn-full" id="saveNoteBtn" onclick="saveNote()">💾 Enregistrer la note</button>
    </div>

    <div class="section-header" style="margin-top:8px;">
      <div class="card-title" style="margin:0">Mes notes</div>
      <button class="btn btn-secondary" style="font-size:12px;padding:7px 12px;" onclick="generateDailySummary()">📋 Résumé IA</button>
    </div>
    <div id="notesList"></div>
    <div class="ai-response" id="summaryResponse"></div>
  </div>

  <!-- TAB: CHECKLIST -->
  <div class="tab" id="tab-check">
    <div class="section-header">
      <div class="section-title">Fin de journée</div>
      <button class="btn btn-secondary" style="font-size:12px;padding:7px 12px;" onclick="generateChecklist()">⚡ Générer</button>
    </div>
    <div class="checklist-header">
      <span class="progress-label" id="checkProgress">0/0</span>
      <div class="progress-bar-wrap"><div class="progress-bar-fill" id="checkProgressBar" style="width:0%"></div></div>
      <button class="btn btn-green" style="font-size:12px;padding:7px 12px;" id="tomorrowBtn" onclick="prepareTomorrow()" disabled>Préparer demain →</button>
    </div>
    <div id="checklistItems"></div>
    <div class="ai-response" id="tomorrowResponse"></div>
  </div>

  <!-- TAB: CLIENTS -->
  <div class="tab" id="tab-clients">
    <div class="section-header">
      <div class="section-title">Rappels clients</div>
      <button class="btn btn-primary" style="font-size:12px;padding:7px 12px;" onclick="openClientModal()">+ Ajouter</button>
    </div>
    <div style="position:relative;margin-bottom:10px;">
      <span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);">🔍</span>

    </div>
    <div id="clientCount" style="font-size:12px;color:var(--muted);margin-bottom:8px;"></div>
    <div id="clientsList"></div>
  </div>

  <!-- TAB: AGENDA -->
  <div class="tab" id="tab-agenda">

      <div class="section-title">Planning</div>
      <div style="display:flex;gap:6px;">
        <button class="btn btn-secondary" style="font-size:12px;padding:7px 10px;" onclick="gcalPrevWeek()">‹</button>
        <button class="btn btn-secondary" style="font-size:12px;padding:7px 10px;" onclick="gcalToday()">Auj.</button>
        <button class="btn btn-secondary" style="font-size:12px;padding:7px 10px;" onclick="gcalNextWeek()">›</button>
        <button class="btn btn-secondary" style="font-size:12px;padding:7px 10px;" onclick="loadAgenda()">🔄</button>
      </div>
    </div>
    <div id="gcal-auth-bar" style="display:none;margin-bottom:10px;">
      <button class="btn btn-primary btn-full" onclick="gcalLogin()">🔐 Connecter Google Agenda</button>
    </div>
    <div id="gcal-week-header" style="display:grid;grid-template-columns:repeat(5,1fr);gap:4px;margin-bottom:8px;"></div>
    <div id="agendaContent"><div class="empty-state">Chargement de l'agenda...</div></div>
    <button class="btn btn-primary btn-full" style="margin-top:12px;" onclick="gcalNewEvent()">+ Nouveau RDV</button>
  </div>

  <!-- TAB: IA -->
  <div class="tab" id="tab-ia">
    <div class="section-header">
      <div class="section-title">Assistant IA</div>
    </div>
    <div class="ia-shortcuts">
      <button class="shortcut-btn" onclick="setPrompt('Rédige un devis professionnel pour : ')"><span class="shortcut-icon">📄</span>Faire un devis</button>
      <button class="shortcut-btn" onclick="setPrompt('Rédige un SMS de relance client professionnel mais chaleureux pour : ')"><span class="shortcut-icon">📱</span>Relance client</button>
      <button class="shortcut-btn" onclick="setPrompt('Dresse la liste du matériel électrique nécessaire pour ce chantier : ')"><span class="shortcut-icon">🔌</span>Liste matériel</button>
      <button class="shortcut-btn" onclick="setPrompt('Explique-moi la norme NFC 15-100 concernant : ')"><span class="shortcut-icon">📋</span>Normes NFC</button>
      <button class="shortcut-btn" onclick="setPrompt('Rédige un compte-rendu de visite chantier pour : ')"><span class="shortcut-icon">🏗️</span>Compte-rendu</button>
      <button class="shortcut-btn" onclick="setPrompt('Rédige un email professionnel de la part de Mathieu LARUICCI, gérant d\'Harmonie Électricité (06 31 13 47 01) pour : ')"><span class="shortcut-icon">✉️</span>Email pro</button>
    </div>
    <textarea class="ia-input" id="iaInput" placeholder="Décris ta situation ou ta demande..."></textarea>
    <button class="btn btn-primary btn-full" style="margin-top:10px;" onclick="askAI()">⚡ Envoyer à l'IA</button>
    <div class="ai-response" id="iaResponse"></div>
  </div>


  <!-- TAB: DOCS (Bons + Devis) -->
  <div class="tab" id="tab-docs">
    <div class="section-header">
      <div class="section-title">Documents</div>
      <div style="display:flex;gap:6px;">
        <button class="btn btn-secondary" style="font-size:12px;padding:7px 10px;" onclick="devisNew('bon')">+ Bon</button>
        <button class="btn btn-primary" style="font-size:12px;padding:7px 10px;" onclick="devisNew('devis')">+ Devis</button>
      </div>
    </div>
    <!-- Barre de recherche -->
    <div style="position:relative;margin-bottom:10px;">
      <span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);">🔍</span>
      <input type="text" id="docsSearchInput" placeholder="Client, numéro, date…"

        style="width:100%;padding:10px 12px 10px 36px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;">
    </div>
    <!-- Filtres -->
    <div style="display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px;">
      <button class="docs-filter active" data-filter="all" onclick="docsSetFilter('all',this)">Tous</button>
      <button class="docs-filter" data-filter="bon" onclick="docsSetFilter('bon',this)">📋 Bons</button>
      <button class="docs-filter" data-filter="devis" onclick="docsSetFilter('devis',this)">📄 Devis</button>
      <button class="docs-filter" data-filter="valide" onclick="docsSetFilter('valide',this)">✅ Validés</button>
      <button class="docs-filter" data-filter="brouillon" onclick="docsSetFilter('brouillon',this)">✏️ Brouillons</button>
    </div>
    <div id="docsCount" style="font-size:12px;color:var(--muted);margin-bottom:8px;"></div>
    <div id="docsList"></div>
  </div>

  <!-- TAB: COFFRE CODES -->
  <div class="tab" id="tab-coffre">
    <div id="cc-root"></div>
  </div>
</div><!-- /content -->

<script>
// ============================================================
//  CONFIG — SUPABASE
// ============================================================
const SUPA_URL = 'https://bqzebkobyfktemnwfwbt.supabase.co';
const SUPA_KEY = 'sb_publishable_vh62KxFcG1NuLcnya6WpMg_oFRtY-2v';
const CLAUDE_KEY_URL = 'https://api.anthropic.com/v1/messages';

// ============================================================
//  LOCAL STATE
// ============================================================
let NOTES = [];
let CHECKLIST = [];
let CLIENTS = [];

let recognition = null;
let isRecording = false;
let selectedTag = 'devis';
let syncTimer = null;
let syncPending = false;

// ============================================================
//  SUPABASE HELPERS — stockage JSONB simple
// ============================================================
const SB_HEADERS = {
  'apikey': SUPA_KEY,
  'Authorization': 'Bearer ' + SUPA_KEY,
  'Content-Type': 'application/json'
};

// Fetch all rows → returns array of objects stored in col "payload"
async function sbGet(table) {
  try {
    const r = await fetch(`${SUPA_URL}/rest/v1/${table}?select=id,payload`, {
      headers: SB_HEADERS
    });
    if (!r.ok) return null;
    const rows = await r.json();
    if (!Array.isArray(rows)) return null;
    return rows.map(r => ({ id: r.id, ...r.payload }));
  } catch { return null; }
}

// Upsert one item — store the whole object as payload, keyed by item.id
async function sbUpsert(table, item) {
  try {
    const r = await fetch(`${SUPA_URL}/rest/v1/${table}`, {
      method: 'POST',
      headers: { ...SB_HEADERS, 'Prefer': 'resolution=merge-duplicates,return=minimal' },
      body: JSON.stringify({ id: item.id, payload: item })
    });
    return r.ok || r.status === 201;
  } catch { return false; }
}

// Delete one row by id
async function sbDelete(table, id) {
  try {
    const r = await fetch(`${SUPA_URL}/rest/v1/${table}?id=eq.${encodeURIComponent(id)}`, {
      method: 'DELETE',
      headers: SB_HEADERS
    });
    return r.ok;
  } catch { return false; }
}

// Push entire local array: upsert all + delete rows not in local
async function sbReplaceAll(table, items) {
  try {
    if (items.length) {
      const r = await fetch(`${SUPA_URL}/rest/v1/${table}`, {
        method: 'POST',
        headers: { ...SB_HEADERS, 'Prefer': 'resolution=merge-duplicates,return=minimal' },
        body: JSON.stringify(items.map(item => ({ id: item.id, payload: item })))
      });
      if (!r.ok && r.status !== 201) return false;
    }
    // Remove remote rows whose id is no longer in local
    const localIds = items.map(i => i.id);
    const remote = await sbGet(table);
    if (remote) {
      const toDelete = remote.filter(r => !localIds.includes(r.id));
      for (const row of toDelete) await sbDelete(table, row.id);
    }
    return true;
  } catch { return false; }
}

// ============================================================
//  SYNC  — LOCAL FIRST, THEN PUSH / MERGE
// ============================================================
function setSyncState(state) {
  const dot = document.getElementById('syncDot');
  const lbl = document.getElementById('syncLabel');
  dot.className = 'sync-dot' + (state === 'green' ? ' green' : state === 'syncing' ? ' syncing' : '');
  lbl.textContent = state === 'green' ? 'Sync ✓' : state === 'syncing' ? 'Sync…' : 'Local';
}

function saveLocal() {
  localStorage.setItem('he_notes', JSON.stringify(NOTES));
  localStorage.setItem('he_checklist', JSON.stringify(CHECKLIST));
  localStorage.setItem('he_clients', JSON.stringify(CLIENTS));
}

function loadLocal() {
  try { NOTES = JSON.parse(localStorage.getItem('he_notes')) || []; } catch { NOTES = []; }
  try { CHECKLIST = JSON.parse(localStorage.getItem('he_checklist')) || []; } catch { CHECKLIST = []; }
  try { CLIENTS = JSON.parse(localStorage.getItem('he_clients')) || []; } catch { CLIENTS = []; }
}

// On startup: load local immediately, then sync from Supabase
async function initSync() {
  loadLocal();
  renderNotes(); renderChecklist(); renderClients(); updateClientBadge();

  setSyncState('syncing');

  const [remoteNotes, remoteCheck, remoteClients] = await Promise.all([
    sbGet('notes'), sbGet('checklist'), sbGet('clients')
  ]);

  const anyOk = remoteNotes !== null || remoteCheck !== null || remoteClients !== null;
  if (!anyOk) { setSyncState('red'); return; }

  if (remoteNotes)   NOTES     = mergeArrays(NOTES,     remoteNotes);
  if (remoteCheck)   CHECKLIST = mergeArrays(CHECKLIST, remoteCheck);
  if (remoteClients) CLIENTS   = mergeArrays(CLIENTS,   remoteClients);

  saveLocal();
  renderNotes(); renderChecklist(); renderClients(); updateClientBadge();
  setSyncState('green');
}

// Merge two arrays by id — remote wins for conflicts
function mergeArrays(local, remote) {
  const map = {};
  for (const item of local)  map[item.id] = item;
  for (const item of remote) map[item.id] = item;
  return Object.values(map).sort((a,b) => (b.createdAt||0) - (a.createdAt||0));
}

// Debounced push to Supabase after any change
function schedulePush() {
  saveLocal();
  clearTimeout(syncTimer);
  syncTimer = setTimeout(pushAll, 1500);
  setSyncState('syncing');
}

async function pushAll() {
  const results = await Promise.all([
    sbReplaceAll('notes',     NOTES),
    sbReplaceAll('checklist', CHECKLIST),
    sbReplaceAll('clients',   CLIENTS)
  ]);
  setSyncState(results.every(Boolean) ? 'green' : 'red');
}

function toggleMic() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    showToast('Micro non disponible dans ce navigateur');
    return;
  }
  if (isRecording) stopMic();
  else startMic();
}

function startMic() {
  const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SpeechRec();
  recognition.lang = 'fr-FR';
  recognition.continuous = true;
  recognition.interimResults = true;
  let final = document.getElementById('transcriptArea').value;

  recognition.onresult = e => {
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) final += e.results[i][0].transcript + ' ';
      else interim = e.results[i][0].transcript;
    }
    document.getElementById('transcriptArea').value = final + interim;
  };
  recognition.onerror = () => stopMic();
  recognition.onend = () => { if (isRecording) recognition.start(); };

  recognition.start();
  isRecording = true;
  document.getElementById('micBtn').classList.add('recording');
  document.getElementById('micStatus').textContent = '● Enregistrement…';
}

function stopMic() {
  if (recognition) { recognition.stop(); recognition = null; }
  isRecording = false;
  document.getElementById('micBtn').classList.remove('recording');
  document.getElementById('micStatus').textContent = 'Appuyer pour dicter';
}

function renderChecklist() {
  const el = document.getElementById('checklistItems');
  if (!CHECKLIST.length) {
    el.innerHTML = '<div class="empty-state">Clique sur ⚡ Générer pour créer ta checklist du soir</div>';
    updateCheckProgress();
    return;
  }

  // Find first undone/unskipped
  const activeIdx = CHECKLIST.findIndex(c => !c.done && !c.skipped);

  el.innerHTML = CHECKLIST.map((item, i) => {
    const isActive = i === activeIdx;
    const isLocked = !item.done && !item.skipped && i > activeIdx;
    let cls = 'check-item';
    if (item.done) cls += ' done';
    else if (item.skipped) cls += ' skipped';
    else if (isActive) cls += ' active';
    else if (isLocked) cls += ' locked';

    const numContent = item.done ? '✓' : item.skipped ? '→' : i+1;
    const btns = isActive ? `
      <div class="check-btns">
        <button class="btn btn-primary" style="font-size:12px;padding:8px 13px;" onclick="checkDone(${i})">✓ Traité</button>
        <button class="btn btn-secondary" style="font-size:12px;padding:8px 13px;" onclick="checkSkip(${i})">Reporter à demain</button>
        <button class="btn btn-secondary" style="font-size:12px;padding:8px 13px;" onclick="checkIA(${i})">⚡ Aide IA</button>
      </div>` : '';

    return `<div class="${cls}">
      <div class="check-item-top">
        <div class="check-number">${numContent}</div>
        <div class="check-label">${escHtml(item.label)}</div>
      </div>
      ${item.detail ? `<div class="check-detail">${escHtml(item.detail)}</div>` : ''}
      ${btns}
    </div>`;
  }).join('');

  updateCheckProgress();
}

function updateCheckProgress() {
  const total = CHECKLIST.length;
  const done = CHECKLIST.filter(c => c.done || c.skipped).length;
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('checkProgress').textContent = `${done}/${total}`;
  document.getElementById('checkProgressBar').style.width = pct + '%';
  const btn = document.getElementById('tomorrowBtn');
  btn.disabled = (done < total);
}

const GCAL_BASE = 'https://stunning-biscotti-d0d195.netlify.app/.netlify/functions/gcal';
let gcalToken = localStorage.getItem('gcal_access_token') || null;

let gcalWeekStart = getMonday(new Date());

function getMonday(d) {
  // Use local date to avoid UTC shift
  const date = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  const day = date.getDay(); // 0=Sun, 1=Mon...
  const diff = day === 0 ? -6 : 1 - day;
  date.setDate(date.getDate() + diff);
  return date;
}

function localDateStr(d) {
  // Returns YYYY-MM-DD in local time (not UTC)
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}

function localMidnight(dateStr) {
  // Parse YYYY-MM-DD as local midnight
  const [y,m,d] = dateStr.split('-').map(Number);
  return new Date(y, m-1, d);
}

function gcalToday() { gcalWeekStart = getMonday(new Date()); loadAgenda(); }
function gcalPrevWeek() { gcalWeekStart = new Date(gcalWeekStart.getTime() - 7*86400000); loadAgenda(); }
function gcalNextWeek() { gcalWeekStart = new Date(gcalWeekStart.getTime() + 7*86400000); loadAgenda(); }

function gcalLogin() {
  const w = window.open(GCAL_BASE + '/auth', 'gcal_auth', 'width=500,height=600');
  window.addEventListener('message', async function handler(e) {
    if (e.data?.type !== 'gcal_tokens') return;
    window.removeEventListener('message', handler);
    gcalToken = e.data.access_token;
    gcalRefresh = e.data.refresh_token;
    localStorage.setItem('gcal_access_token', gcalToken);
    if (gcalRefresh) localStorage.setItem('gcal_refresh_token', gcalRefresh);
    document.getElementById('gcal-auth-bar').style.display = 'none';
    loadAgenda();
  });
}

async function gcalRefreshToken() {
  if (!gcalRefresh) return false;
  try {
    const r = await fetch(GCAL_BASE + '/refresh', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ refresh_token: gcalRefresh })
    });
    const d = await r.json();
    if (d.access_token) {
      gcalToken = d.access_token;
      localStorage.setItem('gcal_access_token', gcalToken);
      return true;
    }
    return false;
  } catch(e) { return false; }
}

async function gcalFetch(path, options = {}) {
  if (!gcalToken) return null;
  options.headers = { ...options.headers, 'Authorization': 'Bearer ' + gcalToken };
  let r = await fetch(GCAL_BASE + path, options);
  if (r.status === 401) {
    const ok = await gcalRefreshToken();
    if (ok) {
      options.headers['Authorization'] = 'Bearer ' + gcalToken;
      r = await fetch(GCAL_BASE + path, options);
    }
  }
  return r;
}

async function loadAgenda() {
  const el = document.getElementById('agendaContent');
  const authBar = document.getElementById('gcal-auth-bar');
  const weekHeader = document.getElementById('gcal-week-header');
  if (!el) return;

  // Show 5-day header (Mon→Fri)
  const today = new Date();
  const todayStr = localDateStr(today);

  if (weekHeader) {
    const days = ['Lun','Mar','Mer','Jeu','Ven'];
    weekHeader.innerHTML = '';
    for (let i = 0; i < 5; i++) {
      const d = new Date(gcalWeekStart.getFullYear(), gcalWeekStart.getMonth(), gcalWeekStart.getDate() + i);
      const dStr = localDateStr(d);
      const isToday = dStr === todayStr;
      const div = document.createElement('div');
      div.className = 'gcal-day-header' + (isToday ? ' today' : '');
      div.innerHTML = `<div class="gcal-day-name">${days[i]}</div><div class="gcal-day-num">${d.getDate()}</div>`;
      div.onclick = () => scrollToDay(dStr);
      weekHeader.appendChild(div);
    }
  }

  if (!gcalToken) {
    authBar && (authBar.style.display = 'block');
    el.innerHTML = '<div class="empty-state">Connecte ton Google Agenda<br>pour voir tes RDV ici.</div>';
    return;
  }
  authBar && (authBar.style.display = 'none');

  el.innerHTML = '<div class="empty-state">Chargement…</div>';

  // Fetch 5 days (Mon→Fri) using local midnight times
  const tMinDate = new Date(gcalWeekStart.getFullYear(), gcalWeekStart.getMonth(), gcalWeekStart.getDate());
  const tMaxDate = new Date(gcalWeekStart.getFullYear(), gcalWeekStart.getMonth(), gcalWeekStart.getDate() + 5);
  const tMin = tMinDate.toISOString();
  const tMax = tMaxDate.toISOString();

  const r = await gcalFetch(`/events?timeMin=${encodeURIComponent(tMin)}&timeMax=${encodeURIComponent(tMax)}`);

  if (!r || !r.ok) {
    el.innerHTML = '<div class="empty-state">Erreur de chargement.<br>Reconnecte-toi.</div>';
    authBar && (authBar.style.display = 'block');
    gcalToken = null;
    return;
  }

  const data = await r.json();
  const events = data.items || [];

  // Group by LOCAL date
  const groups = {};
  for (let i = 0; i < 5; i++) {
    const d = new Date(gcalWeekStart.getFullYear(), gcalWeekStart.getMonth(), gcalWeekStart.getDate() + i);
    groups[localDateStr(d)] = [];
  }
  events.forEach(e => {
    const startRaw = e.start.dateTime || e.start.date;
    // For dateTime, convert to local date; for all-day date, use as-is
    let date;
    if (e.start.dateTime) {
      date = localDateStr(new Date(e.start.dateTime));
    } else {
      date = e.start.date; // all-day events already YYYY-MM-DD local
    }
    if (groups[date] !== undefined) groups[date].push(e);
  });

  const dayNames = ['Lundi','Mardi','Mercredi','Jeudi','Vendredi'];
  let html = '';

  Object.keys(groups).sort().forEach((date, i) => {
    const d = localMidnight(date);
    const isToday = date === todayStr;
    const isPast = d < new Date(today.getFullYear(), today.getMonth(), today.getDate());
    const label = `${dayNames[i]} ${d.getDate()} ${d.toLocaleDateString('fr-FR',{month:'long'})}`;

    html += `<div class="gcal-day-label ${isToday?'today-label':''}" id="day-${date}">${isToday?'● ':''} ${label}</div>`;

    if (!groups[date].length) {
      html += `<div class="gcal-empty-day">Aucun RDV</div>`;
    } else {
      groups[date].forEach(e => {
        const start = e.start.dateTime;
        const end = e.end?.dateTime;
        const timeStr = start
          ? new Date(start).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})
            + ' – ' + new Date(end).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})
          : 'Journée entière';
        const past = isPast || (start && new Date(start) < new Date());
  // Cache events for click handler
  window._gcalEvents = window._gcalEvents || {};

  groups[date].forEach(function(e) {
        const evKey = e.id || (date + '_' + Math.random().toString(36).slice(2,5));
        window._gcalEvents[evKey] = e;
        const start = e.start.dateTime;
        const end = e.end && e.end.dateTime;
        const timeStr = start
          ? new Date(start).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})
            + ' – ' + new Date(end).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})
          : 'Journée entière';
        const past = isPast || (start && new Date(start) < new Date());
        html += '<div class="gcal-event ' + (past?'past':'') + '" onclick="gcalViewEventById(\'' + evKey + '\')">'
          + '<div class="gcal-event-time">' + escHtml(timeStr) + '</div>'
          + '<div class="gcal-event-title">' + escHtml(e.summary||'Sans titre') + '</div>'
          + (e.location ? '<div class="gcal-event-loc">📍 ' + escHtml(e.location) + '</div>' : '')
          + '</div>';
      });
      });
    }
  });

  el.innerHTML = html;

  // Auto-scroll to today
  setTimeout(() => scrollToDay(todayStr), 100);
}

var timerInterval = null;
var timerStart = null;
var timerEventId = null;

function startTimer(eventId) {
  timerStart = Date.now();
  timerEventId = eventId;
  localStorage.setItem('he_timer', JSON.stringify({ start: timerStart, eventId }));
  updateTimerDisplay();
  timerInterval = setInterval(updateTimerDisplay, 1000);
  showToast('Intervention démarrée ⏱');
}

function stopTimer() {
  clearInterval(timerInterval);
  timerInterval = null;
  const duration = timerStart ? Math.round((Date.now() - timerStart) / 60000) : 0;
  localStorage.removeItem('he_timer');
  timerStart = null;
  return duration;
}

function updateTimerDisplay() {
  const el = document.getElementById('timer-display');
  if (!el || !timerStart) return;
  const sec = Math.floor((Date.now() - timerStart) / 1000);
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  const s = sec % 60;
  el.textContent = (h ? h + 'h ' : '') + String(m).padStart(2,'0') + 'min ' + String(s).padStart(2,'0') + 's';
}

// Restaurer minuterie si app rechargée
(function restoreTimer() {
  try {
    const saved = JSON.parse(localStorage.getItem('he_timer'));
    if (saved && saved.start) {
      timerStart = saved.start;
      timerEventId = saved.eventId;
      timerInterval = setInterval(updateTimerDisplay, 1000);
    }
  } catch(e) {}
})();

// ── Matching client automatique — algorithme strict ──
function normalize(s) {
  return (s||'').toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[^a-z0-9\s]/g,'').trim();
}

function matchClient(eventTitle) {
  if (!CLIENTS || !CLIENTS.length || !eventTitle) return null;
  const title = normalize(eventTitle);
  const titleWords = title.split(/\s+/).filter(w => w.length > 2);

  let bestMatch = null;
  let bestScore = 0;

  for (const c of CLIENTS) {
    if (!c.name) continue;
    const name = normalize(c.name);
    const nameWords = name.split(/\s+/).filter(w => w.length > 2);

    // Score = nombre de mots du nom client trouvés dans le titre
    let score = 0;
    let matched = 0;
    for (const nw of nameWords) {
      if (titleWords.some(tw => tw === nw || (nw.length > 4 && tw.includes(nw)))) {
        matched++;
      }
    }

    // Score = ratio mots matchés / total mots du nom
    // Un client avec 2 mots doit avoir les 2 matchés
    // Un client avec 1 mot doit avoir ce mot matché exactement
    if (nameWords.length === 0) continue;
    score = matched / nameWords.length;

    // Seuil strict : au moins 80% des mots du nom doivent matcher
    // ET au moins 2 mots matchés si le nom a 2+ mots
    const minMatched = nameWords.length >= 2 ? 2 : 1;
    if (score >= 0.8 && matched >= minMatched && score > bestScore) {
      bestScore = score;
      bestMatch = c;
    }
  }

  // Sécurité supplémentaire : si le nom du client est très court (1 mot),
  // vérifier que ce mot apparaît en entier dans le titre
  if (bestMatch) {
    const nameWords = normalize(bestMatch.name).split(/\s+/).filter(w => w.length > 2);
    if (nameWords.length === 1) {
      // Mot unique : doit être présent tel quel dans le titre
      if (!titleWords.includes(nameWords[0])) return null;
    }
  }

  return bestMatch;
}

function gcalUpdateRecap() {
  const recap = document.getElementById('gcf-recap');
  if (!recap) return;
  const temps    = parseFloat(document.getElementById('gcf-temps')?.value) || 0;
  const dep      = parseFloat(document.getElementById('gcf-dep')?.value) || 0;
  const montant  = parseFloat(document.getElementById('gcf-montant')?.value) || 0;
  const depCost  = dep * 0.50; // 0.50€/km barème 2026
  const total    = montant + depCost;

  if (!temps && !dep && !montant) { recap.style.display = 'none'; return; }
  recap.style.display = 'block';
  recap.innerHTML = `<strong style="color:var(--accent);">Récapitulatif</strong><br>`
    + (temps ? `⏱ ${temps}h de travail<br>` : '')
    + (dep ? `🚗 ${dep} km × 0,50€ = <strong>${depCost.toFixed(2)}€</strong><br>` : '')
    + (montant ? `🔧 Travaux : <strong>${montant.toFixed(2)}€ HT</strong><br>` : '')
    + (total ? `💶 Total estimé : <strong style="color:var(--green)">${total.toFixed(2)}€ HT</strong>` : '');
}

async function gcalSaveEvent(existingId) {
  const title = document.getElementById('gcf-title').value.trim();
  if (!title) { showToast('Le titre est obligatoire'); return; }
  const date     = document.getElementById('gcf-date').value;
  const start    = document.getElementById('gcf-start').value;
  const end      = document.getElementById('gcf-end').value;
  const loc      = document.getElementById('gcf-loc').value;
  const notes    = document.getElementById('gcf-desc').value.trim();
  const temps    = document.getElementById('gcf-temps').value.trim();
  const dep      = document.getElementById('gcf-dep').value.trim();
  const montant  = document.getElementById('gcf-montant').value.trim();
  const mat      = document.getElementById('gcf-mat').value.trim();
  const statut   = document.getElementById('gcf-statut').value;

  // Build structured description
  let desc = notes ? notes + '\n\n' : '';
  if (statut)  desc += `[STATUT]: ${statut}\n`;
  if (temps)   desc += `[TEMPS]: ${temps} h\n`;
  if (dep)     desc += `[DEPLACEMENT]: ${dep} km\n`;
  if (montant) desc += `[MONTANT_HT]: ${montant} €\n`;
  if (mat)     desc += `[MATERIEL]: ${mat}\n`;

  const event = {
    summary: title,
    location: loc,
    description: desc.trim(),
    start: { dateTime: `${date}T${start}:00`, timeZone: 'Europe/Paris' },
    end:   { dateTime: `${date}T${end}:00`,   timeZone: 'Europe/Paris' }
  };

  const path   = existingId ? `/events/${existingId}` : '/events';
  const method = existingId ? 'PUT' : 'POST';

  const r = await gcalFetch(path, {
    method,
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(event)
  });

  if (r && r.ok) {
    showToast(existingId ? 'RDV modifié ✓' : 'RDV créé ✓');
    document.getElementById('gcal-modal')?.remove();
    loadAgenda();
  } else {
    showToast('Erreur lors de l\'enregistrement');
  }
}

async function gcalDeleteEvent(id) {
  if (!confirm('Supprimer ce RDV ?')) return;
  const r = await gcalFetch(`/events/${id}`, { method: 'DELETE' });
  if (r && (r.ok || r.status === 204)) {
    showToast('RDV supprimé');
    document.getElementById('gcal-modal')?.remove();
    loadAgenda();
  } else {
    showToast('Erreur lors de la suppression');
  }
}

const SUPA_DEVIS = SUPA_URL + '/rest/v1/devis';
const SUPA_CAT   = SUPA_URL + '/rest/v1/catalogue';

let DEVIS_LIST = [];          // devis en mémoire
let CAT_CACHE  = null;        // catalogue chargé une fois
let DEVIS_EN_COURS = null;    // devis en cours d'édition

// ── Charger les devis depuis Supabase ──
async function devisLoad() {
  try {
    const r = await fetch(SUPA_DEVIS + '?select=id,payload&order=id.desc', { headers: SB_HEADERS });
    if (!r.ok) return;
    const rows = await r.json();
    DEVIS_LIST = rows.map(r => ({ id: r.id, ...r.payload }));
  } catch(e) {}
}

// ── Sauvegarder un devis ──
async function devisSave(d) {
  try {
    await fetch(SUPA_DEVIS, {
      method: 'POST',
      headers: { ...SB_HEADERS, 'Prefer': 'resolution=merge-duplicates,return=minimal' },
      body: JSON.stringify({ id: d.id, payload: d })
    });
  } catch(e) {}
}

// ── Supprimer un devis ──
async function devisDelete(id) {
  try {
    await fetch(SUPA_DEVIS + '?id=eq.' + encodeURIComponent(id), { method: 'DELETE', headers: SB_HEADERS });
  } catch(e) {}
}

// ── Charger catalogue Supabase ──
async function catLoad() {
  if (CAT_CACHE) return CAT_CACHE;
  try {
    // Load all pages (max 1000 par requête)
    let all = [];
    let offset = 0;
    while (true) {
      const r = await fetch(SUPA_CAT + '?select=id,payload&limit=500&offset=' + offset, { headers: SB_HEADERS });
      if (!r.ok) break;
      const rows = await r.json();
      if (!rows.length) break;
      all = all.concat(rows.map(r => r.payload));
      if (rows.length < 500) break;
      offset += 500;
    }
    CAT_CACHE = all;
    return all;
  } catch(e) { return []; }
}

}

function devisRendLignes() {
  const lignes = DEVIS_EN_COURS.lignes || [];
  if (!lignes.length) return '<div style="font-size:13px;color:var(--muted);text-align:center;padding:8px;">Aucune ligne — ajoute du matériel ou de la main d\'œuvre</div>';
  return lignes.map((l, i) => `
    <div class="devis-ligne">
      <div class="dl-nom">${escHtml(l.nom)}<br><span style="font-size:10px;color:var(--muted);">${escHtml(l.ref || '')}</span></div>
      <input class="dl-qty" type="number" value="${l.qty}" min="0.1" step="0.5" onchange="devisUpdateLigne(${i},'qty',parseFloat(this.value)||1)">
      <input class="dl-pu" type="number" value="${l.pu}" min="0" step="0.01" onchange="devisUpdateLigne(${i},'pu',parseFloat(this.value)||0)">
      <div class="dl-total">${(l.qty*l.pu).toFixed(2)}€</div>
      <button class="dl-del" onclick="devisDelLigne(${i})">🗑</button>
    </div>`).join('');
}

function devisUpdateLigne(i, key, val) {
  DEVIS_EN_COURS.lignes[i][key] = val;
  devisRefreshLignes();
}

function devisDelLigne(i) {
  DEVIS_EN_COURS.lignes.splice(i, 1);
  devisRefreshLignes();
}

function devisRefreshLignes() {
  const el = document.getElementById('dv-lignes');
  if (el) el.innerHTML = devisRendLignes();
  const total = (DEVIS_EN_COURS.lignes || []).reduce((s,l) => s + l.qty * l.pu, 0);
  const tva = total * 0.20;
  const htEl = document.getElementById('dv-ht');
  const tvaEl = document.getElementById('dv-tva');
  const ttcEl = document.getElementById('dv-ttc');
  if (htEl) htEl.textContent = total.toFixed(2) + ' €';
  if (tvaEl) tvaEl.textContent = tva.toFixed(2) + ' €';
  if (ttcEl) ttcEl.textContent = (total + tva).toFixed(2) + ' €';
}

    </div>

function catSearch(q) {
  const el = document.getElementById('cat-results');
  if (!el || !CAT_CACHE) return;
  if (!q || q.length < 2) {
    el.innerHTML = '<div class="empty-state" style="padding:20px;">Tapez au moins 2 caractères</div>';
    return;
  }
  const ql = q.toLowerCase();
  const results = CAT_CACHE.filter(e =>
    e.ref.toLowerCase().includes(ql) || e.nom.toLowerCase().includes(ql)
  ).slice(0, 30);

  if (!results.length) {
    el.innerHTML = '<div class="empty-state" style="padding:16px;">Aucun résultat</div>';
    return;
  }

  el.innerHTML = results.map(e => `
    <div class="cat-result" onclick="catAjouter('${encodeURIComponent(JSON.stringify({ref:e.ref,nom:e.nom.slice(0,80),pv:e.pv,unite:e.unite}))}')">
      <span class="cat-ref">${escHtml(e.ref)}</span>
      <span class="cat-nom">${escHtml(e.nom.slice(0, 60))}${e.nom.length > 60 ? '…' : ''}</span>
      <span class="cat-pv">${e.pv.toFixed(2)}€</span>
    </div>`).join('');
}

function catAjouter(encoded) {
  const e = JSON.parse(decodeURIComponent(encoded));
  DEVIS_EN_COURS.lignes.push({ ref: e.ref, nom: e.nom, qty: 1, pu: e.pv, unite: e.unite || 'U' });
  devisRefreshLignes();
  document.getElementById('cat-modal')?.remove();
  showToast(e.ref + ' ajouté ✓');
}

var docsSearch = '';
var docsFilter = 'all';

function docsSetFilter(f, btn) {
  docsFilter = f;
  document.querySelectorAll('.docs-filter').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  renderDocsList();
}

async function renderDocsList() {
  const el = document.getElementById('docsList');
  const countEl = document.getElementById('docsCount');
  if (!el) return;

  // Charger depuis Supabase si pas en mémoire
  if (!DEVIS_LIST || !DEVIS_LIST.length) await devisLoad();

  const q = docsSearch.trim().toLowerCase();
  let list = DEVIS_LIST.filter(d => {
    if (docsFilter === 'bon' && !d.numero?.startsWith('BI')) return false;
    if (docsFilter === 'devis' && d.numero?.startsWith('BI')) return false;
    if (docsFilter === 'valide' && d.statut !== 'valide' && d.statut !== 'accepte') return false;
    if (docsFilter === 'brouillon' && d.statut !== 'brouillon') return false;
    if (!q) return true;
    return (d.client||'').toLowerCase().includes(q)
      || (d.numero||'').toLowerCase().includes(q)
      || (d.date||'').includes(q);
  });

  // Tri par date desc
  list.sort((a,b) => (b.createdAt||0) - (a.createdAt||0));

  if (countEl) countEl.textContent = list.length + ' document' + (list.length>1?'s':'');

  if (!list.length) {
    el.innerHTML = '<div class="empty-state">Aucun document trouvé</div>';
    return;
  }

  const statusLabel = { brouillon:'✏️ Brouillon', valide:'✅ Validé', accepte:'✅ Accepté', refuse:'❌ Refusé', facture:'💶 Facturé', envoye:'📤 Envoyé' };
  el.innerHTML = list.map(d => {
    const isBon = d.numero?.startsWith('BI');
    const total = d.totalTTC || (d.lignes||[]).reduce((s,l)=>s+l.qty*l.pu,0)*1.2;
    const statut = statusLabel[d.statut] || d.statut || '';
    return `<div class="doc-item" onclick="docsOpenDetail('${d.id}')">
      <div class="doc-item-header">
        <div>
          <div class="doc-item-num">${isBon?'📋':'📄'} ${escHtml(d.numero||'—')} <span style="margin-left:6px;">${statut}</span></div>
          <div class="doc-item-client">${escHtml(d.client||'Sans client')}</div>
          <div class="doc-item-meta">${escHtml(d.date||'')} ${d.adresse?'· '+d.adresse.slice(0,30):''}</div>
        </div>
        <div class="doc-item-total">${total.toFixed(2)} €</div>
      </div>
      ${d.motif?`<div style="font-size:12px;color:var(--muted);margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escHtml(d.motif.slice(0,60))}</div>`:''}
    </div>`;
  }).join('');
}

function docsOpenDetail(id) {
  const d = DEVIS_LIST.find(x => x.id === id);
  if (!d) return;
  const isBon = d.numero?.startsWith('BI');
  const total = d.totalTTC || 0;
  const toCmd = (d.lignes||[]).filter(l => l.commander);

  const overlay = document.createElement('div');
  overlay.className = 'client-fiche-modal'; overlay.id = 'doc-detail-modal';

  const sheet = document.createElement('div');
  sheet.className = 'client-fiche-sheet';

  let h = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
    <div>
      <div style="font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);">${escHtml(d.numero||'')}</div>

    <div style="font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;margin-bottom:4px;">Motif</div>
    <div style="font-size:13px;">${escHtml(d.motif)}</div>
  </div>`;

  // Rapport
  if (d.rapport) h += `<div style="background:var(--surface2);border-radius:10px;padding:12px;margin-bottom:12px;">
    <div style="font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;margin-bottom:4px;">Rapport</div>
    <div style="font-size:13px;white-space:pre-wrap;">${escHtml(d.rapport)}</div>
  </div>`;

  // Lignes
  if (d.lignes && d.lignes.length) {
    h += `<div style="margin-bottom:12px;">
      <div style="font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;margin-bottom:6px;">Détail</div>`;
    d.lignes.forEach(l => {
      h += `<div style="display:flex;justify-content:space-between;font-size:13px;padding:5px 0;border-bottom:1px solid var(--border);">
        <span>${escHtml(l.nom)}</span>
        <span style="color:var(--accent);font-weight:600;">${l.qty} × ${l.pu.toFixed(2)}€ = ${(l.qty*l.pu).toFixed(2)}€</span>
      </div>`;
    });
    h += '</div>';
  }

  // Total
  h += `<div style="background:rgba(245,166,35,.08);border:1px solid rgba(245,166,35,.2);border-radius:10px;padding:12px;margin-bottom:12px;">
    <div style="display:flex;justify-content:space-between;font-size:14px;margin-bottom:4px;"><span>Total HT</span><strong>${(d.totalHT||0).toFixed(2)} €</strong></div>
    <div style="display:flex;justify-content:space-between;font-size:13px;color:var(--muted);margin-bottom:4px;"><span>TVA ${d.tvaRate||20}%</span><span>${(d.totalTVA||0).toFixed(2)} €</span></div>
    <div style="display:flex;justify-content:space-between;font-size:16px;font-weight:800;color:var(--accent);"><span>Total TTC</span><span>${total.toFixed(2)} €</span></div>
  </div>`;

  // Commande matériel
  if (toCmd.length) {
    h += `<div style="background:rgba(96,165,250,.08);border:1px solid rgba(96,165,250,.2);border-radius:10px;padding:12px;margin-bottom:12px;">
      <div style="font-size:11px;color:var(--blue);font-weight:700;text-transform:uppercase;margin-bottom:6px;">📦 Matériel à commander</div>`;
    toCmd.forEach(l => { h += `<div style="font-size:13px;padding:3px 0;">${l.qty} × ${escHtml(l.nom)}</div>`; });
    h += '</div>';
  }

  // Signatures
  if (d.sigClientOk || d.sigIntervenantOk) {
    h += `<div style="font-size:13px;margin-bottom:12px;">`;
    if (d.sigClientOk) h += `<span style="color:var(--green);margin-right:12px;">✓ Signé client</span>`;
    if (d.sigIntervenantOk) h += `<span style="color:var(--green);">✓ Signé intervenant</span>`;
    h += '</div>';
  }

  sheet.innerHTML = h;

  // Boutons actions
  if (d.email) {
    const btnEmail = document.createElement('button');
    btnEmail.className = 'btn btn-green';
    btnEmail.style.marginBottom = '8px';
    btnEmail.textContent = '✉️ Renvoyer par email';
    btnEmail.onclick = function() { overlay.remove(); envoyerEmailDoc(d); };
    sheet.appendChild(btnEmail);
  }

  const btnClose = document.createElement('button');
  btnClose.className = 'btn btn-secondary';
  btnClose.textContent = 'Fermer';
  btnClose.onclick = function() { overlay.remove(); };
  sheet.appendChild(btnClose);

  overlay.appendChild(sheet);
  document.body.appendChild(overlay);
}

function envoyerEmailDoc(d) {
  const isBon = d.numero?.startsWith('BI');
  const lignesText = (d.lignes||[]).map(l => l.qty+' '+l.nom+' : '+(l.qty*l.pu).toFixed(2)+'€').join('\n');
  const subject = encodeURIComponent((isBon?'Bon d\'intervention':'Devis')+' N°'+d.numero+' — Harmonie Électricité');
  const body = encodeURIComponent(
    (isBon?'Bon d\'intervention':'Devis')+' N°'+d.numero+'\nDate : '+(d.date||'')+'\nClient : '+(d.client||'')+'\n\n'
    +(d.motif?'Motif : '+d.motif+'\n\n':'')
    +(d.rapport?'Rapport : '+d.rapport+'\n\n':'')
    +'--- Détail ---\n'+lignesText+'\n\n'
    +'Total HT : '+(d.totalHT||0).toFixed(2)+' €\n'
    +'TVA '+(d.tvaRate||20)+'% : '+(d.totalTVA||0).toFixed(2)+' €\n'
    +'Total TTC : '+(d.totalTTC||0).toFixed(2)+' €\n\n'
    +'---\nHarmonie Électricité — Mathieu LARUICCI\n06 31 13 47 01 — contact@harmonie-electricite.com'
  );
  window.location.href = 'mailto:'+(d.email||'')+' ?subject='+subject+'&body='+body;
}

async function openFicheClient(id) {
  const c = CLIENTS.find(x => x.id === id);
  if (!c) return;

  // Charger docs de ce client
  if (!DEVIS_LIST || !DEVIS_LIST.length) await devisLoad();
  const clientName = (c.name||'').toLowerCase();
  const docs = DEVIS_LIST.filter(d => (d.client||'').toLowerCase().includes(clientName) || clientName.includes((d.client||'').toLowerCase()));

  const overlay = document.createElement('div');
  overlay.className = 'client-fiche-modal'; overlay.id = 'client-fiche-modal';

  const sheet = document.createElement('div');
  sheet.className = 'client-fiche-sheet';

  let h = `<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;">
    <div>
      <h3 style="font-family:'Syne',sans-serif;font-weight:800;font-size:20px;margin-bottom:4px;">${escHtml(c.name)}</h3>
      ${c.code?`<div style="font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);">${escHtml(c.code)}</div>`:''}
    </div>
    <button onclick="document.getElementById('client-fiche-modal').remove()" style="background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;">×</button>
  </div>`;

  // Coordonnées
  h += `<div style="background:var(--surface2);border-radius:10px;padding:14px;margin-bottom:14px;">
    <div style="font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;margin-bottom:8px;">Coordonnées</div>`;
  if (c.phone) h += `<div style="font-size:14px;margin-bottom:6px;">📞 <a href="tel:${escHtml(c.phone.replace(/\s/g,''))}" style="color:var(--text);text-decoration:none;">${escHtml(c.phone)}</a></div>`;
  if (c.email) h += `<div style="font-size:14px;margin-bottom:6px;">✉️ <a href="mailto:${escHtml(c.email)}" style="color:var(--text);text-decoration:none;">${escHtml(c.email)}</a></div>`;
  if (c.address) h += `<div style="font-size:14px;">📍 ${escHtml(c.address)}</div>`;
  h += '</div>';

  // Actions rapides
  h += `<div style="display:flex;gap:8px;margin-bottom:16px;">`;
  if (c.phone) h += `<a href="tel:${c.phone.replace(/\s/g,'')}" class="btn btn-green btn-sm" style="text-decoration:none;flex:1;">📞 Appeler</a>`;
  if (c.phone) h += `<a href="sms:${c.phone.replace(/\s/g,'')}" class="btn btn-secondary btn-sm" style="text-decoration:none;flex:1;">💬 SMS</a>`;
  h += `</div>`;

  // Historique documents
  h += `<div style="font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;margin-bottom:8px;">Historique documents (${docs.length})</div>`;

  if (!docs.length) {
    h += `<div class="empty-state" style="padding:16px;margin-bottom:14px;">Aucun document pour ce client</div>`;
  } else {
    docs.sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
    docs.forEach(d => {
      const isBon = d.numero?.startsWith('BI');
      const total = d.totalTTC || 0;
      h += `<div class="doc-item" style="margin-bottom:6px;" onclick="document.getElementById('client-fiche-modal').remove();docsOpenDetail('${d.id}')">
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <div>
            <div style="font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);">${isBon?'📋':'📄'} ${escHtml(d.numero||'')}</div>
            <div style="font-size:13px;font-weight:600;">${escHtml(d.date||'')} ${d.motif?'· '+d.motif.slice(0,30):''}</div>
          </div>
          <div style="font-weight:800;color:var(--accent);">${total.toFixed(2)}€</div>
        </div>
      </div>`;
    });
  }

  // Créer nouveau doc pour ce client
  h += `<div style="font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;margin:14px 0 8px;">Nouveau document</div>`;

  sheet.innerHTML = h;

  const btnBon = document.createElement('button');
  btnBon.className = 'btn btn-primary';
  btnBon.style.marginBottom = '8px';
  btnBon.textContent = '📋 Nouveau bon d\'intervention';
  btnBon.onclick = function() {
    overlay.remove();
    // Pré-remplir sessionStorage avec les infos client
    const data = {
      type: 'bon', clientNom: c.name, clientTel: c.phone||'',
      clientEmail: c.email||'', clientAdresse: c.address||'',
      date: new Date().toLocaleDateString('fr-FR'),
      heureDebut:'', heureFin:'', dureeMin:0, description:'', adresse:c.address||''
    };
    sessionStorage.setItem('he_bon_data', JSON.stringify(data));
    window.open('bon.html', '_blank');
  };
  sheet.appendChild(btnBon);

  const btnDevis = document.createElement('button');
  btnDevis.className = 'btn btn-secondary';
  btnDevis.style.marginBottom = '8px';
  btnDevis.textContent = '📄 Nouveau devis';
  btnDevis.onclick = function() {
    overlay.remove();
    const data = {
      type: 'devis', clientNom: c.name, clientTel: c.phone||'',
      clientEmail: c.email||'', clientAdresse: c.address||'',
      date: new Date().toLocaleDateString('fr-FR'),
      heureDebut:'', heureFin:'', dureeMin:0, description:'', adresse:c.address||''
    };
    sessionStorage.setItem('he_bon_data', JSON.stringify(data));
    window.open('bon.html', '_blank');
  };
  sheet.appendChild(btnDevis);

  const btnClose = document.createElement('button');
  btnClose.className = 'btn btn-secondary';
  btnClose.textContent = 'Fermer';
  btnClose.onclick = function() { overlay.remove(); };
  sheet.appendChild(btnClose);

  overlay.appendChild(sheet);
  document.body.appendChild(overlay);
}
